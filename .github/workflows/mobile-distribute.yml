name: Mobile Distribute

# CD: manual internal builds for hermes-mobile via EAS.
# Requires repository secret EXPO_TOKEN (expo.dev → Access Tokens).

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - both
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - e2e-test
          - development

concurrency:
  group: mobile-distribute-${{ github.ref_name }}-${{ inputs.platform }}-${{ inputs.profile }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  eas-build:
    name: EAS build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Require EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required repository secret: EXPO_TOKEN" >&2
            echo "Create one at https://expo.dev/accounts/[account]/settings/access-tokens" >&2
            exit 1
          fi

      - name: Install dependencies
        working-directory: hermes-mobile
        run: npm ci

      - name: Type check before build
        working-directory: hermes-mobile
        run: npm run typecheck

      - name: Run unit tests
        working-directory: hermes-mobile
        run: npm run test:ci

      - name: EAS build
        working-directory: hermes-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          PLATFORM="${{ inputs.platform }}"
          PROFILE="${{ inputs.profile }}"
          npx eas-cli@latest build \
            --platform "$PLATFORM" \
            --profile "$PROFILE" \
            --non-interactive \
            --wait \
            --json \
            --message "Hermes Mobile ${PROFILE} from ${GITHUB_SHA}" \
            > /tmp/eas-build.json
          cat /tmp/eas-build.json
          node -e '
            const fs = require("fs");
            const raw = fs.readFileSync("/tmp/eas-build.json", "utf8");
            const json = JSON.parse(raw);
            const builds = Array.isArray(json) ? json : [json];
            for (const build of builds) {
              if (build.status !== "FINISHED") {
                throw new Error(`EAS build ${build.id} status is ${build.status}`);
              }
              console.log(`Build ${build.id} finished: ${build.artifacts?.buildUrl || "no url"}`);
            }
          '
