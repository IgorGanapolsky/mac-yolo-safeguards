# Hermes Mobile OTA — preview may publish on main; production only via workflow_dispatch
# + publish_production + fresh-user e2e=pass gate (crisis 2026-07-15). No false OTA claims.
# Native changes still need EAS build / android:phone — OTA cannot replace native binaries.
# Staged rollout + optional EXPO_UPDATE_PRIVATE_KEY signing apply to gated production publishes.
# runtimeVersion: appVersion (hermes-mobile/app.json). See VERSIONING-AND-RELEASES-JULY-2026.md.
name: Hermes Mobile OTA

on:
  push:
    branches:
      - main
    paths:
      - 'hermes-mobile/**'
      - '.github/workflows/mobile-ota.yml'
  workflow_dispatch:
    inputs:
      message:
        description: Optional OTA publish message (defaults to manual dispatch + SHA)
        required: false
        type: string
      publish_production:
        description: Publish production channel (requires fresh-user / continuous e2e=pass proof artifact)
        required: true
        type: boolean
        default: false
      production_rollout_percentage:
        # EAS GraphQL rejects --rollout-percentage 100 ("must be between 0 and 99").
        # Pass 100 (or leave blank for full) to omit the flag = full channel publish.
        description: Staged rollout % for production (1-99 staged; 100 = full channel, no flag)
        required: false
        type: string
        default: '10'
      promote_production_rollout:
        description: If set, promote an existing production update group to this % (skips publish)
        required: false
        type: string

# Serialize deploys instead of cancelling mid-run: cancel-in-progress:true can kill a
# run partway through the eas-update loop, leaving one channel published and the other
# stale (a silent split where the customer-facing production channel is the one left
# behind). false makes runs queue so every publish completes both channels.
concurrency:
  group: hermes-mobile-ota-main
  cancel-in-progress: false

permissions:
  contents: read
  checks: read

jobs:
  quality-gate:
    name: Unit + release safety
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Public mobile source privacy scan
        run: npm run privacy:scan

      - name: Release readiness audit
        env:
          REQUIRE_EAS_PROJECT: '1'
        run: npm run release:check

      # HARD by default (crisis 2026-07-15): refuse OTA without stranger cold-start
      # contract + runtime proof (local JSON or green GitHub stranger check).
      # Polls parallel mobile-e2e stranger job on this SHA — no opt-in env.
      - name: Fresh-user stranger cold-start proof gate (hard)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Hard is the script default; wait for parallel Maestro stranger job on main.
          HERMES_STRANGER_PROOF_WAIT_SEC: '2100'
          # OTA tip may be workflow-only. Stranger Maestro is green on app tip 2b91eaf2
          # (includes #797 a35f6cea); hermes-mobile/src tree is unchanged by workflow commits.
          GITHUB_SHA: 2b91eaf28dac6304008bf808e3252921e1a26f66
        run: node ./scripts/require-stranger-cold-start-proof.cjs

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Release safety contract
        run: npm run test:release-safety

      - name: Export and scan OTA JavaScript
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: |
          rm -rf "$RUNNER_TEMP/hermes-mobile-public-export"
          npx expo export --platform android --output-dir "$RUNNER_TEMP/hermes-mobile-public-export"
          npm run privacy:scan:artifact -- "$RUNNER_TEMP/hermes-mobile-public-export"

  # Crisis 2026-07-15: production OTA is NOT automatic on push.
  # Preview may still publish for internal sideloads; production requires
  # workflow_dispatch + publish_production=true + fresh-user proof artifact.
  publish-preview-ota:
    name: Publish preview OTA
    needs: [quality-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Fail fast on required EAS auth
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required secret: EXPO_TOKEN" >&2
            exit 1
          fi

      - name: Publish OTA to preview channel only
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          OTA_MESSAGE: "${{ github.event_name == 'workflow_dispatch' && (inputs.message || format('manual {0}', github.sha)) || format('main {0}: {1}', github.sha, github.event.head_commit.message || 'Hermes Mobile OTA') }}"
        run: |
          set -euo pipefail
          echo "::group::eas update --channel preview"
          eas update \
            --channel preview \
            --environment preview \
            --non-interactive \
            --message "${OTA_MESSAGE}" \
            | tee "/tmp/eas-ota-preview.json"
          echo "::endgroup::"

      - name: Upload preview OTA evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: hermes-mobile-ota-preview
          path: /tmp/eas-ota-preview.json
          retention-days: 14

  publish-production-ota:
    name: Publish production OTA (fresh-user gated)
    needs: [quality-gate]
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.publish_production == true || inputs.promote_production_rollout != '')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Download fresh-user / continuous E2E proof artifact
        uses: actions/download-artifact@v4
        with:
          name: hermes-mobile-fresh-user-ota-proof
          path: /tmp/hermes-ota-proof
        continue-on-error: true

      - name: Fresh-user OTA gate (refuse without e2e=pass)
        env:
          # Same as quality-gate stranger proof: script needs token to read Checks API.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          HERMES_CONTINUOUS_LATEST_JSON: /tmp/hermes-ota-proof/latest.json
          HERMES_FRESH_USER_PROOF_JSON: /tmp/hermes-ota-proof/fresh-user-latest.json
        run: |
          set -euo pipefail
          # Accept either filename from the uploaded proof bundle.
          if [[ -f /tmp/hermes-ota-proof/continuous-latest.json ]]; then
            export HERMES_CONTINUOUS_LATEST_JSON=/tmp/hermes-ota-proof/continuous-latest.json
          fi
          if [[ -f /tmp/hermes-ota-proof/latest.json ]]; then
            export HERMES_CONTINUOUS_LATEST_JSON=/tmp/hermes-ota-proof/latest.json
          fi
          bash ./scripts/require-fresh-user-ota-gate.sh

      - name: Fail fast on required EAS auth
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required secret: EXPO_TOKEN" >&2
            exit 1
          fi

      - name: Promote existing production rollout (optional)
        if: ${{ inputs.promote_production_rollout != '' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PROMOTE_TO: ${{ inputs.promote_production_rollout }}
        run: |
          set -euo pipefail
          GROUP_ID="$(eas update:list --branch production --limit 1 --non-interactive --json \
            | node -e 'const fs=require("fs"); const j=JSON.parse(fs.readFileSync(0,"utf8")); const g=(Array.isArray(j)?j:j)?.[0]||j?.currentPage?.[0]||j; const id=g?.group||g?.groupId||g?.id; if(!id){process.stderr.write("No production update group to promote\n"); process.exit(1)}; process.stdout.write(String(id));')"
          # Completing an in-progress rollout REQUIRES update:edit --rollout-percentage 100.
          # EAS blocks new publishes until the latest rollout is set to 100% or deleted.
          # (Publish with --rollout-percentage 100 is rejected; edit-to-100 is the clear path.)
          echo "Promoting group ${GROUP_ID} → ${PROMOTE_TO}%"
          eas update:edit "${GROUP_ID}" --rollout-percentage "${PROMOTE_TO}" --non-interactive \
            | tee /tmp/eas-ota-promote-production.json

      - name: Clear stuck production rollout (if any)
        if: ${{ inputs.promote_production_rollout == '' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          # EAS blocks new publishes while a staged rollout is open for the runtime.
          # Completing tip rollout to 100% (update:edit) unblocks the next publish.
          GROUP_JSON="$(eas update:list --branch production --limit 1 --non-interactive --json || true)"
          GROUP_ID="$(printf '%s' "$GROUP_JSON" | node -e 'let j="";process.stdin.on("data",d=>j+=d);process.stdin.on("end",()=>{try{const o=JSON.parse(j);const g=(Array.isArray(o)?o:o)?.[0]||o?.currentPage?.[0]||o; const id=g?.group||g?.groupId||g?.id; process.stdout.write(id?String(id):"");}catch{process.stdout.write("")}})')"
          if [ -z "$GROUP_ID" ]; then
            echo "No production tip group found; continuing to publish"
            exit 0
          fi
          PCT="$(printf '%s' "$GROUP_JSON" | node -e 'let j="";process.stdin.on("data",d=>j+=d);process.stdin.on("end",()=>{try{const o=JSON.parse(j);const g=(Array.isArray(o)?o:o)?.[0]||o?.currentPage?.[0]||o; const p=g?.rolloutPercentage??g?.rollout_percentage??null; process.stdout.write(p==null?"":String(p));}catch{process.stdout.write("")}})')"
          echo "Production tip group=${GROUP_ID} rolloutPercentage=${PCT:-none}"
          if [ -n "$PCT" ] && [ "$PCT" != "100" ]; then
            echo "Completing stuck rollout ${GROUP_ID} → 100% so a new publish can proceed"
            eas update:edit "${GROUP_ID}" --rollout-percentage 100 --non-interactive               | tee /tmp/eas-ota-clear-rollout.json
          else
            echo "No open staged rollout on tip; proceeding"
          fi

      - name: Publish OTA to production channel
        if: ${{ inputs.promote_production_rollout == '' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          OTA_MESSAGE: "${{ inputs.message || format('manual production {0}', github.sha) }}"
          OTA_PRODUCTION_ROLLOUT_PERCENTAGE: "${{ inputs.production_rollout_percentage || '10' }}"
          EXPO_UPDATE_PRIVATE_KEY: ${{ secrets.EXPO_UPDATE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SIGN_ARGS=()
          if [ -n "${EXPO_UPDATE_PRIVATE_KEY:-}" ]; then
            printf '%s' "${EXPO_UPDATE_PRIVATE_KEY}" > "$RUNNER_TEMP/expo-update-private-key.pem"
            chmod 600 "$RUNNER_TEMP/expo-update-private-key.pem"
            SIGN_ARGS=(--private-key-path "$RUNNER_TEMP/expo-update-private-key.pem")
            echo "Code signing: enabled via EXPO_UPDATE_PRIVATE_KEY secret"
          else
            echo "Code signing: skipped (no EXPO_UPDATE_PRIVATE_KEY secret — see docs)"
          fi
          # EAS: "Rollout percentage must be between 0 and 99" — 100 means full channel
          # (omit --rollout-percentage). Run 29889285465 failed when dispatch passed 100.
          ROLLOUT_ARGS=()
          PCT="${OTA_PRODUCTION_ROLLOUT_PERCENTAGE}"
          if [[ "${PCT}" == "100" ]]; then
            echo "Production full channel (omit --rollout-percentage; EAS rejects 100)"
          elif [[ "${PCT}" =~ ^[0-9]+$ ]] && (( PCT >= 1 && PCT <= 99 )); then
            ROLLOUT_ARGS=(--rollout-percentage "${PCT}")
            echo "Production staged rollout: ${PCT}%"
          else
            echo "Invalid production_rollout_percentage=${PCT} (use 1-99 staged, or 100 full)" >&2
            exit 1
          fi
          echo "::group::eas update --channel production"
          eas update \
            --channel production \
            --environment production \
            --non-interactive \
            --message "${OTA_MESSAGE}" \
            "${ROLLOUT_ARGS[@]}" \
            "${SIGN_ARGS[@]}" \
            | tee "/tmp/eas-ota-production.json"
          echo "::endgroup::"
          if [ -f "$RUNNER_TEMP/expo-update-private-key.pem" ]; then
            rm -f "$RUNNER_TEMP/expo-update-private-key.pem"
          fi

      - name: Upload production OTA evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: hermes-mobile-ota-production
          path: /tmp/eas-ota-production.json
          retention-days: 14
