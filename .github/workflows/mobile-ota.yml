# Hermes Mobile OTA — publish JS/asset fixes to preview + production channels on main merges.
# Native changes (new modules, plugins, SDK bump, app version bump) still need EAS build
# or `npm run android:phone` — OTA cannot replace native binaries.
#
# runtimeVersion policy: appVersion (see hermes-mobile/app.json). OTA bundles apply only
# to native builds whose embedded runtime matches expo.version (e.g. 0.3.2). Bump app.json
# version → new native build required before OTA resumes for that line.
name: Hermes Mobile OTA

on:
  push:
    branches:
      - main
    paths:
      - 'hermes-mobile/**'
      - '.github/workflows/mobile-ota.yml'
  workflow_dispatch:
    inputs:
      message:
        description: Optional OTA publish message (defaults to manual dispatch + SHA)
        required: false
        type: string
      publish_production:
        description: Publish production channel (requires fresh-user / continuous e2e=pass proof artifact)
        required: true
        type: boolean
        default: false

# Serialize deploys instead of cancelling mid-run: cancel-in-progress:true can kill a
# run partway through the eas-update loop, leaving one channel published and the other
# stale (a silent split where the customer-facing production channel is the one left
# behind). false makes runs queue so every publish completes both channels.
concurrency:
  group: hermes-mobile-ota-main
  cancel-in-progress: false

permissions:
  contents: read
  checks: read

jobs:
  quality-gate:
    name: Unit + release safety
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Public mobile source privacy scan
        run: npm run privacy:scan

      - name: Release readiness audit
        env:
          REQUIRE_EAS_PROJECT: '1'
        run: npm run release:check

      # HARD by default (crisis 2026-07-15): refuse OTA without stranger cold-start
      # contract + runtime proof (local JSON or green GitHub stranger check).
      # Polls parallel mobile-e2e stranger job on this SHA — no opt-in env.
      - name: Fresh-user stranger cold-start proof gate (hard)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Hard is the script default; wait for parallel Maestro stranger job on main.
          HERMES_STRANGER_PROOF_WAIT_SEC: '2100'
        run: node ./scripts/require-stranger-cold-start-proof.cjs

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Release safety contract
        run: npm run test:release-safety

      - name: Export and scan OTA JavaScript
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: |
          rm -rf "$RUNNER_TEMP/hermes-mobile-public-export"
          npx expo export --platform android --output-dir "$RUNNER_TEMP/hermes-mobile-public-export"
          npm run privacy:scan:artifact -- "$RUNNER_TEMP/hermes-mobile-public-export"

  # Crisis 2026-07-15: production OTA is NOT automatic on push.
  # Preview may still publish for internal sideloads; production requires
  # workflow_dispatch + publish_production=true + fresh-user proof artifact.
  publish-preview-ota:
    name: Publish preview OTA
    needs: [quality-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Fail fast on required EAS auth
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required secret: EXPO_TOKEN" >&2
            exit 1
          fi

      - name: Publish OTA to preview channel only
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          OTA_MESSAGE: "${{ github.event_name == 'workflow_dispatch' && (inputs.message || format('manual {0}', github.sha)) || format('main {0}: {1}', github.sha, github.event.head_commit.message || 'Hermes Mobile OTA') }}"
        run: |
          set -euo pipefail
          echo "::group::eas update --channel preview"
          eas update \
            --channel preview \
            --environment preview \
            --non-interactive \
            --message "${OTA_MESSAGE}" \
            | tee "/tmp/eas-ota-preview.json"
          echo "::endgroup::"

      - name: Upload preview OTA evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: hermes-mobile-ota-preview
          path: /tmp/eas-ota-preview.json
          retention-days: 14

  publish-production-ota:
    name: Publish production OTA (fresh-user gated)
    needs: [quality-gate]
    if: github.event_name == 'workflow_dispatch' && inputs.publish_production == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Download fresh-user / continuous E2E proof artifact
        uses: actions/download-artifact@v4
        with:
          name: hermes-mobile-fresh-user-ota-proof
          path: /tmp/hermes-ota-proof
        continue-on-error: true

      - name: Fresh-user OTA gate (refuse without e2e=pass)
        env:
          HERMES_CONTINUOUS_LATEST_JSON: /tmp/hermes-ota-proof/latest.json
          HERMES_FRESH_USER_PROOF_JSON: /tmp/hermes-ota-proof/fresh-user-latest.json
        run: |
          set -euo pipefail
          # Accept either filename from the uploaded proof bundle.
          if [[ -f /tmp/hermes-ota-proof/continuous-latest.json ]]; then
            export HERMES_CONTINUOUS_LATEST_JSON=/tmp/hermes-ota-proof/continuous-latest.json
          fi
          if [[ -f /tmp/hermes-ota-proof/latest.json ]]; then
            export HERMES_CONTINUOUS_LATEST_JSON=/tmp/hermes-ota-proof/latest.json
          fi
          bash ./scripts/require-fresh-user-ota-gate.sh

      - name: Fail fast on required EAS auth
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required secret: EXPO_TOKEN" >&2
            exit 1
          fi

      - name: Publish OTA to production channel
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          OTA_MESSAGE: "${{ inputs.message || format('manual production {0}', github.sha) }}"
        run: |
          set -euo pipefail
          echo "::group::eas update --channel production"
          eas update \
            --channel production \
            --environment production \
            --non-interactive \
            --message "${OTA_MESSAGE}" \
            | tee "/tmp/eas-ota-production.json"
          echo "::endgroup::"

      - name: Upload production OTA evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: hermes-mobile-ota-production
          path: /tmp/eas-ota-production.json
          retention-days: 14
