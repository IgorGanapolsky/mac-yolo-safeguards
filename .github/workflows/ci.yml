name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-and-guard-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: JavaScript syntax
        run: |
          set -eu
          git ls-files '*.js' | while IFS= read -r file; do
            node --check "$file"
          done

      - name: Shell syntax
        run: |
          set -eu
          sh -n install.sh sim-runaway-guard.sh yolo-health tests/test-secondary-browser-reclaim.sh

      - name: Guard E2E
        run: |
          set -eu
          tests/test-secondary-browser-reclaim.sh

      - name: Public secret smoke scan
        run: |
          set -eu
          ! git grep -nE '(ghp_[A-Za-z0-9_]+|sk_live_[A-Za-z0-9_]+|TELEGRAM_BOT_TOKEN=|STRIPE_SECRET_KEY=sk_)' -- ':!.github/workflows/ci.yml'

  mobile-checks:
    name: Mobile Type-check and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        working-directory: hermes-mobile
        run: npm ci

      - name: Type check
        working-directory: hermes-mobile
        run: npm run typecheck

      - name: Run unit tests
        working-directory: hermes-mobile
        run: npm test

