name: CI

on:
  pull_request:
  push:
    branches:
      - main
  # Required when `main` uses a merge queue: without this trigger the queue never
  # receives status checks for macOS guard / mobile-checks / funnel jobs and merges stall.
  # merge_group uses its own ref (not pull_request); keep per-ref concurrency below so
  # queue runs do not re-trigger the 2026-07-10 cancel storm on PR branches.
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # mac-mini-hermes (self-hosted, macos-arm64, hermes-e2e) is the default to cut
  # GitHub-hosted macOS queue wait. Fork PRs stay on macos-latest (arbitrary code).
  # If the mini is offline, temporarily switch runs-on below to macos-latest.
  macos-guard:
    name: macOS guard kit
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'macos-latest' || fromJSON('["self-hosted", "macos-arm64", "hermes-e2e"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: JavaScript syntax
        run: |
          set -eu
          git ls-files '*.js' | while IFS= read -r file; do
            node --check "$file"
          done

      - name: Shell syntax
        run: |
          set -eu
          git ls-files '*.sh' | while IFS= read -r file; do
            case "$(head -n 1 "$file")" in
              *bash*) bash -n "$file" ;;
              *) sh -n "$file" ;;
            esac
          done
          sh -n yolo-health

      - name: Python static checks
        run: |
          set -eu
          python3 -c 'import ast, pathlib, subprocess; tracked=subprocess.check_output(["git", "ls-files", "*.py"], text=True).splitlines(); files=[path for path in tracked if pathlib.Path(path).is_file()]; [ast.parse(pathlib.Path(path).read_text(), filename=path) for path in files]; print(f"parsed {len(files)} Python files")'
          python3 -m venv "$RUNNER_TEMP/ruff-venv"
          "$RUNNER_TEMP/ruff-venv/bin/pip" install --disable-pip-version-check --quiet ruff==0.15.20
          git ls-files '*.py' | while IFS= read -r file; do test ! -f "$file" || printf '%s\n' "$file"; done | xargs "$RUNNER_TEMP/ruff-venv/bin/ruff" check --select F,E722

      - name: Hermes gateway watchdog unit tests
        run: |
          set -eu
          bash tests/test-hermes-gateway-watchdog.sh

      - name: Hermes mobile pair script unit tests
        run: |
          set -eu
          bash tests/test-hermes-mobile-pair.sh

      - name: Hermes gateway watchdog e2e orchestration suite
        run: |
          set -eu
          bash tests/test-hermes-gateway-watchdog-e2e.sh

      - name: Node tool unit tests
        run: |
          set -u
          # test-hermes-yolo.js spawns the real Hermes binary. The runner has no
          # ~/.local/bin/hermes, so point the wrapper's HERMES_BIN override at a
          # stub emitting the version string the test asserts on.
          stub_dir="$(mktemp -d)"
          printf '#!/bin/sh\necho "Hermes Agent 0.17.0 (ci-stub)"\n' > "$stub_dir/hermes"
          chmod +x "$stub_dir/hermes"
          export HERMES_BIN="$stub_dir/hermes"

          # test-mac-text-hotkeys-config.js asserts on the contents of a personal
          # Hammerspoon config (~/Documents/mac-text-hotkeys/init.lua) not present
          # in the repo. Stubbing it would assert against the stub, so it stays
          # excluded until that config is checked in.
          failed=0
          for f in tests/test-*.js; do
            case "$f" in
              tests/test-mac-text-hotkeys-config.js) continue ;;
            esac
            if node "$f" >/tmp/node-test.log 2>&1; then
              echo "ok   $f"
            else
              echo "FAIL $f"
              cat /tmp/node-test.log
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::$failed node tool unit test file(s) failed"
            exit 1
          fi

      - name: Smoke install and yolo-health
        run: |
          set -eu
          mkdir -p "$HOME/workspace/git/igor/antigravity-hub/antigravity-cli/bin"
          ./install.sh

      - name: Guard E2E
        run: |
          set -eu
          tests/test-adb-reverse-device-filter.sh
          tests/test-secondary-browser-reclaim.sh

      - name: Public secret smoke scan
        run: |
          set -eu
          ! git grep -nE '(ghp_[A-Za-z0-9_]+|github_pat_[A-Za-z0-9_]+|xai-[A-Za-z0-9_-]{20,}|AIzaSy[A-Za-z0-9_-]{20,}|sk_live_[A-Za-z0-9_]+|TELEGRAM_BOT_TOKEN=|STRIPE_SECRET_KEY=sk_|X-Goog-Signature=)' \
            -- ':!.github/workflows/ci.yml' ':!.github/workflows/internal-distribution.yml' ':!.github/workflows/store-release.yml'

  revenue-public-checks:
    name: Public funnel checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Public conversion check
        run: node tools/public-conversion-check.js

      - name: Public funnel safety scan
        run: node tools/public-funnel-safety-scan.js

      - name: Public command reference check
        run: node tools/public-command-reference-check.js

      - name: Public local link check
        run: node tools/public-local-link-check.js

      - name: GitHub issue template check
        run: node tools/github-issue-template-check.js

      - name: Publication readiness
        run: node tools/publication-readiness.js

  mobile-checks:
    name: Hermes Mobile typecheck and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Public mobile source privacy scan
        run: npm run privacy:scan

      - name: Release readiness audit
        env:
          REQUIRE_EAS_PROJECT: "1"
        run: npm run release:check

      - name: Type check
        run: npm run typecheck

      - name: Expo Doctor
        env:
          EXPO_DOCTOR_ALLOW_NPX_DOWNLOAD: "1"
        run: npm run doctor:expo

      - name: Unit tests with coverage
        run: npm run test:ci

      - name: Export and scan public Android JavaScript
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: |
          rm -rf "$RUNNER_TEMP/hermes-mobile-public-export"
          npx expo export --platform android --output-dir "$RUNNER_TEMP/hermes-mobile-public-export"
          npm run privacy:scan:artifact -- "$RUNNER_TEMP/hermes-mobile-public-export"

      - name: E2E flow validation (Maestro tier-0)
        run: npm run e2e:validate

      - name: Release safety contract
        run: npm run test:release-safety
