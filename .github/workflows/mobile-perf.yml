# DMAIC "Control" (T-74): catch JS performance regressions in hot chat paths
# before they reach the phone. Runs Reassure (statistical perf tests) on the
# PR branch vs its merge-base and publishes the comparison to the job summary.
# Free GitHub runners only — no EAS spend. Not a required check.
name: Mobile Perf (Reassure)

on:
  pull_request:
    paths:
      - "hermes-mobile/src/**"
      - "hermes-mobile/package.json"
  workflow_dispatch:

concurrency:
  group: mobile-perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reassure:
    name: Reassure perf regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Measure baseline (merge-base)
        run: |
          BASE=$(git merge-base origin/${{ github.base_ref || 'main' }} HEAD)
          git checkout "$BASE" -- src || true
          npx reassure --baseline

      - name: Measure current branch
        run: |
          git checkout HEAD -- src
          npx reassure

      - name: Publish comparison
        if: always()
        run: |
          if [ -f .reassure/output.md ]; then
            cat .reassure/output.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No Reassure output produced" >> "$GITHUB_STEP_SUMMARY"
          fi
