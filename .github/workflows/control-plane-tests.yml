name: control-plane-tests

on:
  pull_request:
    paths:
      - "apps/hermes-control-plane/**"
      - ".github/workflows/control-plane-tests.yml"
  push:
    branches: [main]
    paths:
      - "apps/hermes-control-plane/**"

permissions:
  contents: read

jobs:
  unit-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/hermes-control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: apps/hermes-control-plane/package-lock.json
      - run: npm ci
      - name: Unit tests with coverage gates (80% lines/functions, 70% branches)
        run: npm run test:unit
      - name: Build + rendered-HTML tests
        run: npm run test
