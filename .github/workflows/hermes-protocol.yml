name: Hermes thread protocol

on:
  pull_request:
    paths:
      - "packages/hermes-protocol/**"
      - ".github/workflows/hermes-protocol.yml"
  push:
    branches: [main]
    paths:
      - "packages/hermes-protocol/**"
      - ".github/workflows/hermes-protocol.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hermes-protocol-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protocol-contract:
    name: Coverage + two-client HTTP E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/hermes-protocol
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/hermes-protocol/package-lock.json

      - name: Install locked dependency graph
        run: npm ci

      - name: Enforce coverage thresholds
        shell: bash
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee coverage-proof.txt

      - name: Re-run two-client HTTP E2E in isolation
        run: npm run test:e2e

      - name: Verify publish surface has no unexpected files
        run: npm pack --dry-run --ignore-scripts

      - name: Add coverage proof to job summary
        if: always()
        shell: bash
        run: |
          if [[ -f coverage-proof.txt ]]; then
            {
              echo '## Hermes protocol coverage'
              echo '```text'
              sed -n '/start of coverage report/,/end of coverage report/p' coverage-proof.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage proof
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hermes-protocol-coverage-${{ github.run_attempt }}
          path: packages/hermes-protocol/coverage-proof.txt
          if-no-files-found: error
          retention-days: 14
