name: Zero-focus automation guard

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zero-focus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed-automation:
    name: No foreground automation in changed entrypoints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Prove detector behavior
        run: node --test tests/test-zero-focus-automation-audit.js

      - name: Reject new foreground-capable automation
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${BASE_SHA:-}" ]] ||
             [[ "$BASE_SHA" =~ ^0+$ ]] ||
             ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="$(git rev-parse HEAD^)"
          fi

          if [[ -z "${HEAD_SHA:-}" ]] || ! git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
            HEAD_SHA="$(git rev-parse HEAD)"
          fi

          changed_automation=()
          while IFS= read -r file; do
            [[ -f "$file" ]] || continue
            case "$file" in
              tools/zero-focus-automation-audit.js|docs/*|parallel-research/*|tests/*|*/__tests__/*)
                continue
                ;;
            esac

            mode="$(git ls-files --stage -- "$file" | awk 'NR == 1 { print $1 }')"
            case "$file" in
              .github/workflows/*|scripts/*|tools/*|hermes-mobile/scripts/*|apps/*/scripts/*|saas/*|.hammerspoon/*|*.bash|*.lua|*.plist|*.scpt|*.sh|*.zsh)
                changed_automation+=("$file")
                ;;
              *)
                [[ "$mode" == "100755" ]] && changed_automation+=("$file")
                ;;
            esac
          done < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA")

          if (( ${#changed_automation[@]} == 0 )); then
            echo "No changed automation entrypoints to scan."
            exit 0
          fi

          printf 'Zero-focus enforcement targets:\n - %s\n' "${changed_automation[@]}"
          node tools/zero-focus-automation-audit.js enforce "${changed_automation[@]}"
