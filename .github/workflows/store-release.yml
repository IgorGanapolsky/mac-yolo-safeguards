name: Store Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to release"
        required: true
        default: both
        type: choice
        options:
          - android
          - ios
          - both
      submit:
        description: "Submit finished production build to store/TestFlight"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_internal_proof:
        description: "Skip internal-signoff gate (bootstrap only — use after manual QA)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: store-release-${{ github.ref_name }}-${{ inputs.platform }}
  cancel-in-progress: false

permissions:
  contents: read
  statuses: read

jobs:
  internal-proof-gate:
    name: Require Internal Proof
    if: inputs.skip_internal_proof != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Require exact-SHA internal signoff statuses
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PLATFORM: ${{ inputs.platform }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/status" > /tmp/status.json

          require_context() {
            local context="$1"
            if ! jq -e --arg context "$context" '.statuses[] | select(.context == $context and .state == "success")' /tmp/status.json >/dev/null; then
              echo "Missing required successful commit status on ${GITHUB_SHA}: ${context}" >&2
              exit 1
            fi
          }

          case "$RELEASE_PLATFORM" in
            android)
              require_context "internal-signoff/eas-android"
              require_context "internal-signoff/firebase-android"
              ;;
            ios)
              require_context "internal-signoff/eas-ios"
              ;;
            both)
              require_context "internal-signoff/eas-android"
              require_context "internal-signoff/firebase-android"
              require_context "internal-signoff/eas-ios"
              ;;
            *)
              echo "Unsupported platform: $RELEASE_PLATFORM" >&2
              exit 1
              ;;
          esac

  android-production:
    name: Android Production AAB
    needs: [internal-proof-gate]
    if: |
      always() &&
      (needs.internal-proof-gate.result == 'success' || needs.internal-proof-gate.result == 'skipped') &&
      (inputs.platform == 'android' || inputs.platform == 'both')
    runs-on: ubuntu-latest
    environment: production-android
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Hermes Mobile Play submit: GOOGLE_SERVICE_ACCOUNT_JSON from sync-hermes-secrets.sh
      # (hermes-mobile-publisher@… — not Firebase, not other-app Play keys). See PLAY_RELEASE.md.
      - name: Prepare Google Play service account key
        if: inputs.submit == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "Missing required secret: GOOGLE_SERVICE_ACCOUNT_JSON" >&2
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/google-service-account.json"
          echo "EXPO_ANDROID_SERVICE_ACCOUNT_KEY_PATH=$RUNNER_TEMP/google-service-account.json" >> "$GITHUB_ENV"

      - name: Android production preflight
        env:
          REQUIRE_ANDROID_SUBMIT_CREDS: ${{ inputs.submit == 'true' && '1' || '0' }}
        run: npm run launch:preflight:android

      - name: Build Android production AAB
        id: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required secret: EXPO_TOKEN" >&2
            exit 1
          fi
          npx eas-cli@latest build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --json \
            --message "Production Hermes Mobile Android release from ${GITHUB_SHA}" \
            > /tmp/eas-android-production-build.json
          cat /tmp/eas-android-production-build.json
          BUILD_ID="$(node -e 'const fs=require("fs"); const raw=fs.readFileSync("/tmp/eas-android-production-build.json","utf8"); const json=JSON.parse(raw); const build=Array.isArray(json)?json[0]:json; console.log(build.id || "")')"
          if [ -z "$BUILD_ID" ]; then
            echo "Could not read Android production build id" >&2
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Verify Android production AAB read-back
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_ID: ${{ steps.build.outputs.build_id }}
        run: |
          set -euo pipefail
          npx eas-cli@latest build:view "$BUILD_ID" --json > /tmp/eas-android-production-build-view.json
          node - <<'NODE'
          const fs = require('fs');
          const build = JSON.parse(fs.readFileSync('/tmp/eas-android-production-build-view.json', 'utf8'));
          if (build.status !== 'FINISHED') throw new Error(`Build status is ${build.status}`);
          if (build.platform !== 'ANDROID') throw new Error(`Expected ANDROID, got ${build.platform}`);
          if (build.distribution !== 'STORE') throw new Error(`Expected STORE distribution, got ${build.distribution}`);
          if (!build.artifacts?.buildUrl?.endsWith('.aab')) throw new Error(`Expected AAB artifact, got ${build.artifacts?.buildUrl || 'missing'}`);
          console.log(`Android production AAB verified: ${build.artifacts.buildUrl}`);
          NODE

      - name: Submit Android build to Google Play
        if: inputs.submit == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_ID: ${{ steps.build.outputs.build_id }}
        run: |
          set -euo pipefail
          npx eas-cli@latest submit \
            --platform android \
            --id "$BUILD_ID" \
            --profile production \
            --non-interactive \
            --wait \
            2>&1 | tee /tmp/eas-android-submit.txt

      - name: Upload Android release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: android-production-evidence
          path: |
            /tmp/eas-android-production-build.json
            /tmp/eas-android-production-build-view.json
            /tmp/eas-android-submit.txt
          retention-days: 14

  ios-production:
    name: iOS Production Build
    needs: [internal-proof-gate]
    if: |
      always() &&
      (needs.internal-proof-gate.result == 'success' || needs.internal-proof-gate.result == 'skipped') &&
      (inputs.platform == 'ios' || inputs.platform == 'both')
    runs-on: ubuntu-latest
    environment: production-ios
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare App Store Connect API key
        if: inputs.submit == 'true'
        env:
          EXPO_ASC_API_KEY_BASE64: ${{ secrets.EXPO_ASC_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${EXPO_ASC_API_KEY_BASE64:-}" ]; then
            printf '%s' "$EXPO_ASC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
            echo "EXPO_ASC_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          fi

      - name: iOS production preflight
        env:
          REQUIRE_IOS_SUBMIT_CREDS: ${{ inputs.submit == 'true' && '1' || '0' }}
          EXPO_ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
          EXPO_ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
        run: npm run launch:preflight:ios

      - name: Build iOS production artifact
        id: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required secret: EXPO_TOKEN" >&2
            exit 1
          fi
          npx eas-cli@latest build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait \
            --json \
            --message "Production Hermes Mobile iOS release from ${GITHUB_SHA}" \
            > /tmp/eas-ios-production-build.json
          cat /tmp/eas-ios-production-build.json
          BUILD_ID="$(node -e 'const fs=require("fs"); const raw=fs.readFileSync("/tmp/eas-ios-production-build.json","utf8"); const json=JSON.parse(raw); const build=Array.isArray(json)?json[0]:json; console.log(build.id || "")')"
          if [ -z "$BUILD_ID" ]; then
            echo "Could not read iOS production build id" >&2
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Verify iOS production build read-back
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_ID: ${{ steps.build.outputs.build_id }}
        run: |
          set -euo pipefail
          npx eas-cli@latest build:view "$BUILD_ID" --json > /tmp/eas-ios-production-build-view.json
          node - <<'NODE'
          const fs = require('fs');
          const build = JSON.parse(fs.readFileSync('/tmp/eas-ios-production-build-view.json', 'utf8'));
          if (build.status !== 'FINISHED') throw new Error(`Build status is ${build.status}`);
          if (build.platform !== 'IOS') throw new Error(`Expected IOS, got ${build.platform}`);
          if (build.distribution !== 'STORE') throw new Error(`Expected STORE distribution, got ${build.distribution}`);
          console.log(`iOS production build verified: ${build.artifacts?.buildUrl || build.id}`);
          NODE

      - name: Submit iOS build to App Store Connect/TestFlight
        if: inputs.submit == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
          EXPO_ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
          BUILD_ID: ${{ steps.build.outputs.build_id }}
        run: |
          set -euo pipefail
          npx eas-cli@latest submit \
            --platform ios \
            --id "$BUILD_ID" \
            --profile production \
            --non-interactive \
            --wait \
            2>&1 | tee /tmp/eas-ios-submit.txt

      - name: Upload iOS release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: ios-production-evidence
          path: |
            /tmp/eas-ios-production-build.json
            /tmp/eas-ios-production-build-view.json
            /tmp/eas-ios-submit.txt
          retention-days: 14
