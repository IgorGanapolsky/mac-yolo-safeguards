name: Store Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to release"
        required: true
        default: both
        type: choice
        options:
          - android
          - ios
          - both
      submit:
        description: "Submit finished production build to store/TestFlight"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_internal_proof:
        description: "Skip internal-signoff gate (bootstrap only — use after manual QA)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      confirm_eas_spend:
        description: "I know this queues a paid EAS production build (~$1+ Starter credit)"
        required: true
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"
      eas_build_id:
        description: "Reuse finished production build UUID (submit-only — skips eas build --wait)"
        required: false
        type: string
      audit_play_track:
        description: "Read Google Play production version/status only (no build, submit, or edit commit)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: store-release-${{ github.ref_name }}-${{ inputs.platform }}
  cancel-in-progress: false

permissions:
  contents: read
  statuses: read

jobs:
  internal-proof-gate:
    name: Require Internal Proof
    if: inputs.skip_internal_proof != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Require exact-SHA internal signoff statuses
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PLATFORM: ${{ inputs.platform }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/status" > /tmp/status.json

          require_context() {
            local context="$1"
            if ! jq -e --arg context "$context" '.statuses[] | select(.context == $context and .state == "success")' /tmp/status.json >/dev/null; then
              echo "Missing required successful commit status on ${GITHUB_SHA}: ${context}" >&2
              exit 1
            fi
          }

          case "$RELEASE_PLATFORM" in
            android)
              require_context "internal-signoff/eas-android"
              require_context "internal-signoff/firebase-android"
              ;;
            ios)
              require_context "internal-signoff/eas-ios"
              ;;
            both)
              require_context "internal-signoff/eas-android"
              require_context "internal-signoff/firebase-android"
              require_context "internal-signoff/eas-ios"
              ;;
            *)
              echo "Unsupported platform: $RELEASE_PLATFORM" >&2
              exit 1
              ;;
          esac

  android-production-track-audit:
    name: Android Production Track Audit
    needs: [internal-proof-gate]
    if: |
      always() &&
      inputs.audit_play_track == 'true' &&
      inputs.platform == 'android' &&
      (needs.internal-proof-gate.result == 'success' || needs.internal-proof-gate.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production-android
    steps:
      - name: Read production release state from Google Play
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PLAY_PACKAGE: com.iganapolsky.hermesmobile
        run: |
          node <<'NODE'
          const crypto = require('crypto');

          const credentials = JSON.parse(process.env.GOOGLE_SERVICE_ACCOUNT_JSON || '{}');
          if (!credentials.client_email || !credentials.private_key) {
            throw new Error('Missing Google Play service account credentials');
          }

          const encode = (value) => Buffer.from(JSON.stringify(value)).toString('base64url');
          const now = Math.floor(Date.now() / 1000);
          const unsigned = [
            encode({ alg: 'RS256', typ: 'JWT' }),
            encode({
              iss: credentials.client_email,
              scope: 'https://www.googleapis.com/auth/androidpublisher',
              aud: credentials.token_uri || 'https://oauth2.googleapis.com/token',
              iat: now,
              exp: now + 3600,
            }),
          ].join('.');
          const signature = crypto.sign('RSA-SHA256', Buffer.from(unsigned), credentials.private_key)
            .toString('base64url');
          const assertion = `${unsigned}.${signature}`;

          async function json(response, label) {
            const body = await response.json().catch(() => ({}));
            if (!response.ok) {
              throw new Error(`${label} failed with HTTP ${response.status}: ${body.error?.message || 'unknown error'}`);
            }
            return body;
          }

          async function main() {
            const tokenResponse = await fetch(credentials.token_uri || 'https://oauth2.googleapis.com/token', {
              method: 'POST',
              headers: { 'content-type': 'application/x-www-form-urlencoded' },
              body: new URLSearchParams({
                grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer',
                assertion,
              }),
            });
            const token = await json(tokenResponse, 'OAuth token exchange');
            const base = `https://androidpublisher.googleapis.com/androidpublisher/v3/applications/${process.env.PLAY_PACKAGE}`;
            const headers = {
              authorization: `Bearer ${token.access_token}`,
              'content-type': 'application/json',
            };
            const edit = await json(await fetch(`${base}/edits`, {
              method: 'POST',
              headers,
              body: '{}',
            }), 'Create read-only edit');
            const tracks = await json(await fetch(`${base}/edits/${edit.id}/tracks`, { headers }), 'List tracks');
            const production = (tracks.tracks || []).find((track) => track.track === 'production');
            const releases = (production?.releases || []).map((release) => ({
              name: release.name || null,
              status: release.status || null,
              versionCodes: release.versionCodes || [],
              userFraction: release.userFraction ?? null,
            }));
            console.log(`PLAY_TRACK_AUDIT=${JSON.stringify({
              packageName: process.env.PLAY_PACKAGE,
              track: 'production',
              releases,
              editCommitted: false,
            })}`);
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

  android-production:
    name: Android Production AAB
    needs: [internal-proof-gate]
    if: |
      always() &&
      inputs.audit_play_track != 'true' &&
      (needs.internal-proof-gate.result == 'success' || needs.internal-proof-gate.result == 'skipped') &&
      (inputs.platform == 'android' || inputs.platform == 'both')
    runs-on: ubuntu-latest
    environment: production-android
    env:
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Public mobile source privacy scan
        run: npm run privacy:scan

      # Hermes Mobile Play submit: GOOGLE_SERVICE_ACCOUNT_JSON from sync-hermes-secrets.sh
      # (hermes-mobile-publisher@… — not Firebase, not other-app Play keys). See PLAY_RELEASE.md.
      - name: Prepare Google Play service account key
        if: inputs.submit == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "Missing required secret: GOOGLE_SERVICE_ACCOUNT_JSON" >&2
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/google-service-account.json"
          echo "EXPO_ANDROID_SERVICE_ACCOUNT_KEY_PATH=$RUNNER_TEMP/google-service-account.json" >> "$GITHUB_ENV"

      - name: Android production preflight
        env:
          REQUIRE_ANDROID_SUBMIT_CREDS: ${{ inputs.submit == 'true' && '1' || '0' }}
        run: npm run launch:preflight:android

      - name: Require EAS spend confirmation for new production builds
        if: inputs.eas_build_id == ''
        env:
          CONFIRM_EAS: ${{ inputs.confirm_eas_spend }}
        run: |
          set -euo pipefail
          if [ "${CONFIRM_EAS:-no}" != "yes" ]; then
            echo "::error::New EAS production builds cost Starter credits (~\$1+ each). Set confirm_eas_spend=yes, or pass eas_build_id to submit an existing AAB without a new build." >&2
            echo "Current production AAB to reuse: ab9ed28d-9038-40e4-a9c5-864ddb2bc1e1 (v0.3.2 vc7, commit 56d479f9eac7)" >&2
            exit 1
          fi

      - name: Build Android production AAB
        id: build
        if: inputs.eas_build_id == ''
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          HERMES_EAS_SPEND_APPROVED: ${{ inputs.confirm_eas_spend == 'yes' && 'YES_SPEND_EAS_CREDITS' || '' }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required secret: EXPO_TOKEN" >&2
            exit 1
          fi
          node ./scripts/eas-build-guard.cjs --platform android --profile production -- npx eas-cli@latest build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --json \
            --message "Production Hermes Mobile Android release from ${GITHUB_SHA}" \
            > /tmp/eas-android-production-build.json
          cat /tmp/eas-android-production-build.json
          BUILD_ID="$(node -e 'const fs=require("fs"); const raw=fs.readFileSync("/tmp/eas-android-production-build.json","utf8"); const json=JSON.parse(raw); const build=Array.isArray(json)?json[0]:json; console.log(build.id || "")')"
          if [ -z "$BUILD_ID" ]; then
            echo "Could not read Android production build id" >&2
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Reuse existing EAS Android production build
        id: adopt_build
        if: inputs.eas_build_id != ''
        run: |
          set -euo pipefail
          BUILD_ID="${{ inputs.eas_build_id }}"
          printf '%s\n' "{\"id\":\"$BUILD_ID\"}" > /tmp/eas-android-production-build.json
          echo "Reusing EAS production build $BUILD_ID (no new build credits)"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Verify Android production AAB read-back
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          HERMES_EAS_SPEND_APPROVED: ${{ inputs.confirm_eas_spend == 'yes' && 'YES_SPEND_EAS_CREDITS' || '' }}
          BUILD_ID: ${{ steps.build.outputs.build_id || steps.adopt_build.outputs.build_id }}
        run: |
          set -euo pipefail
          npx eas-cli@latest build:view "$BUILD_ID" --json > /tmp/eas-android-production-build-view.json
          node - <<'NODE'
          const fs = require('fs');
          const build = JSON.parse(fs.readFileSync('/tmp/eas-android-production-build-view.json', 'utf8'));
          if (build.status !== 'FINISHED') throw new Error(`Build status is ${build.status}`);
          if (build.platform !== 'ANDROID') throw new Error(`Expected ANDROID, got ${build.platform}`);
          if (build.distribution !== 'STORE') throw new Error(`Expected STORE distribution, got ${build.distribution}`);
          if (!build.artifacts?.buildUrl?.endsWith('.aab')) throw new Error(`Expected AAB artifact, got ${build.artifacts?.buildUrl || 'missing'}`);
          console.log(`Android production AAB verified: ${build.artifacts.buildUrl}`);
          NODE

      - name: Download and scan Android production AAB
        env:
          BUILD_ID: ${{ steps.build.outputs.build_id || steps.adopt_build.outputs.build_id }}
        run: |
          set -euo pipefail
          BUILD_URL="$(node -e 'const b=require("/tmp/eas-android-production-build-view.json"); process.stdout.write(b.artifacts?.buildUrl || "")')"
          test -n "$BUILD_URL"
          curl --fail --location --silent --show-error "$BUILD_URL" --output "$RUNNER_TEMP/hermes-production.aab"
          npm run privacy:scan:artifact -- "$RUNNER_TEMP/hermes-production.aab"

      - name: Submit Android build to Google Play
        if: inputs.submit == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_ID: ${{ steps.build.outputs.build_id || steps.adopt_build.outputs.build_id }}
        run: |
          set -euo pipefail
          npx eas-cli@latest submit \
            --platform android \
            --id "$BUILD_ID" \
            --profile production \
            --non-interactive \
            --wait \
            2>&1 | tee /tmp/eas-android-submit.txt

      - name: Upload Android release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: android-production-evidence
          path: |
            /tmp/eas-android-production-build.json
            /tmp/eas-android-production-build-view.json
            /tmp/eas-android-submit.txt
          retention-days: 14

  ios-production:
    name: iOS Production Build
    needs: [internal-proof-gate]
    if: |
      always() &&
      (needs.internal-proof-gate.result == 'success' || needs.internal-proof-gate.result == 'skipped') &&
      (inputs.platform == 'ios' || inputs.platform == 'both')
    runs-on: ubuntu-latest
    environment: production-ios
    env:
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Public mobile source privacy scan
        run: npm run privacy:scan

      - name: Prepare App Store Connect API key
        if: inputs.submit == 'true'
        env:
          EXPO_ASC_API_KEY_BASE64: ${{ secrets.EXPO_ASC_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${EXPO_ASC_API_KEY_BASE64:-}" ]; then
            printf '%s' "$EXPO_ASC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
            echo "EXPO_ASC_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          fi

      - name: iOS production preflight
        env:
          REQUIRE_IOS_SUBMIT_CREDS: ${{ inputs.submit == 'true' && '1' || '0' }}
          EXPO_ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
          EXPO_ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
        run: npm run launch:preflight:ios

      - name: Build iOS production artifact
        id: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Missing required secret: EXPO_TOKEN" >&2
            exit 1
          fi
          node ./scripts/eas-build-guard.cjs --platform ios --profile production -- npx eas-cli@latest build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait \
            --json \
            --message "Production Hermes Mobile iOS release from ${GITHUB_SHA}" \
            > /tmp/eas-ios-production-build.json
          cat /tmp/eas-ios-production-build.json
          BUILD_ID="$(node -e 'const fs=require("fs"); const raw=fs.readFileSync("/tmp/eas-ios-production-build.json","utf8"); const json=JSON.parse(raw); const build=Array.isArray(json)?json[0]:json; console.log(build.id || "")')"
          if [ -z "$BUILD_ID" ]; then
            echo "Could not read iOS production build id" >&2
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Verify iOS production build read-back
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_ID: ${{ steps.build.outputs.build_id }}
        run: |
          set -euo pipefail
          npx eas-cli@latest build:view "$BUILD_ID" --json > /tmp/eas-ios-production-build-view.json
          node - <<'NODE'
          const fs = require('fs');
          const build = JSON.parse(fs.readFileSync('/tmp/eas-ios-production-build-view.json', 'utf8'));
          if (build.status !== 'FINISHED') throw new Error(`Build status is ${build.status}`);
          if (build.platform !== 'IOS') throw new Error(`Expected IOS, got ${build.platform}`);
          if (build.distribution !== 'STORE') throw new Error(`Expected STORE distribution, got ${build.distribution}`);
          console.log(`iOS production build verified: ${build.artifacts?.buildUrl || build.id}`);
          NODE

      - name: Download and scan iOS production artifact
        run: |
          set -euo pipefail
          BUILD_URL="$(node -e 'const b=require("/tmp/eas-ios-production-build-view.json"); process.stdout.write(b.artifacts?.buildUrl || "")')"
          test -n "$BUILD_URL"
          curl --fail --location --silent --show-error "$BUILD_URL" --output "$RUNNER_TEMP/hermes-production.ipa"
          npm run privacy:scan:artifact -- "$RUNNER_TEMP/hermes-production.ipa"

      - name: Submit iOS build to App Store Connect/TestFlight
        if: inputs.submit == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
          EXPO_ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
          BUILD_ID: ${{ steps.build.outputs.build_id }}
        run: |
          set -euo pipefail
          npx eas-cli@latest submit \
            --platform ios \
            --id "$BUILD_ID" \
            --profile production \
            --non-interactive \
            --wait \
            2>&1 | tee /tmp/eas-ios-submit.txt

      - name: Upload iOS release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: ios-production-evidence
          path: |
            /tmp/eas-ios-production-build.json
            /tmp/eas-ios-production-build-view.json
            /tmp/eas-ios-submit.txt
          retention-days: 14
