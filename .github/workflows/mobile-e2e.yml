name: Mobile E2E (Android emulator)

# Tier-1 E2E: runs the Maestro ship-guard critical-path flow on a real Android emulator.
# The fast tier-0 gate (flow validation) already runs on every PR inside CI / mobile-checks.
#
# This is a REQUIRED-capable PR gate (T-114): it runs on pull_request (scoped to hermes-mobile
# changes so unrelated PRs are not blocked/slowed) and on push, plus manual dispatch. Every
# action is pinned by commit SHA per this repo's security policy — the two previously-floating
# TODO tags (setup-java@v4, android-emulator-runner@v2) are now pinned below.
#
# It intentionally runs ONLY the single ship-guard critical-path flow (no chat text entry) so it
# stays fast and reliable enough to keep enabled as a required check. ship-guard does not type
# into the composer, so it is NOT affected by the Android IME composing-region issue that keeps
# chat-send-persistence red (see hermes-mobile/docs/RELEASE-SAFETY-NET.md).
#
# To make this a required status check, a repo admin must add the job's check name
# "Maestro ship-guard (Android emulator)" to branch protection for `main` (see the docs file).

# Runs on push to `main` (post-merge guard) and on pull_request — the releaseSafetyNet
# contract requires BOTH the push: and pull_request: triggers, and this keeps them.
#
# Why push is scoped to `main` (previously: all branches): on a PR branch the
# pull_request event already runs this job once. An UNSCOPED push: fired a SECOND,
# simultaneous 45-min emulator run on the very same commit — the two never deduped
# because the `concurrency` group below is keyed on github.ref, which differs between the
# push event (refs/heads/<branch>) and the pull_request event (refs/pull/<n>/merge). The
# two runs then contended for the emulator until one hung, wedging the required
# "Maestro ship-guard (Android emulator)" check. Scoping push to `main` yields exactly
# one run per commit (pull_request on PR branches; push on main) while STILL guarding
# direct merges to main via the post-merge push run.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'hermes-mobile/**'
      - '.github/workflows/mobile-e2e.yml'
      - '.github/workflows/mobile-ota.yml'
  pull_request:
    paths:
      - 'hermes-mobile/**'
      - '.github/workflows/mobile-e2e.yml'
      - '.github/workflows/mobile-ota.yml'

# One global Maestro emulator slot: parallel PR branches used per-ref groups with
# cancel-in-progress, which cancelled each other's ship-guard runs and left checks CANCELLED.
# Queue globally; never cancel in-flight runs from another ref.
concurrency:
  group: hermes-mobile-maestro-ship-guard
  cancel-in-progress: false

jobs:
  android-e2e:
    name: Maestro ship-guard (Android emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Validate Maestro flows (tier-0, fail fast before the emulator boots)
        run: npm run e2e:validate

      - name: Release safety net contract
        run: npm run test:release-safety

      - name: Enable KVM (hardware acceleration for the emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Prebuild + assemble debug APK (x86_64 for the emulator)
        env:
          # CI-only: embed demo/dev deep links (hermes://setup?demo=1, leash-unlock) in the APK.
          # Production release builds must NOT set this — see install-phone-release.sh.
          EXPO_PUBLIC_E2E_AUTOMATION: "1"
          # No SENTRY_AUTH_TOKEN in CI — skip native sourcemap upload (T-121 / PR #71).
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          SENTRY_ALLOW_FAILURE: "true"
        run: |
          npx expo prebuild -p android --no-install
          (cd android && ./gradlew assembleDebug -PreactNativeArchitectures=x86_64 --no-daemon)

      - name: Run Maestro ship-guard on emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          working-directory: hermes-mobile
          # Harden the cold emulator boot so this required check stops flaking on
          # "device emulator-5554 not found" / boot timeout: headless swiftshader GPU,
          # no audio/boot-anim/snapshot/cameras, animations off, and a generous boot
          # timeout. All additive and reversible.
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none -camera-front none
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            export PATH="$HOME/.maestro/bin:$PATH"
            maestro test .maestro/ship-guard.yaml

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maestro-debug-output
          path: ~/.maestro/tests/**
          if-no-files-found: ignore
