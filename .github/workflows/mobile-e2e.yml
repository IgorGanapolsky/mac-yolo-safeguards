name: Mobile E2E (Android emulator)

# Tier-1 E2E: two parallel Android emulator jobs on hermes-mobile PRs:
#   1) Maestro ship-guard — demo=1 + EXPO_PUBLIC_E2E_AUTOMATION (hides ConnectMacGate)
#   2) Maestro stranger cold-start — clearState, NO demo=1, EXPO_PUBLIC_E2E_AUTOMATION=0
#      so ConnectMacGate is visible (brand-new user proof).
#
# Crisis lesson 2026-07-15: ship-guard alone is NOT a fresh-user ship gate. Stranger cold-start
# must also be a required status check on `main` (see hermes-mobile/docs/RELEASE-SAFETY-NET.md).
#
# The fast tier-0 gate (flow validation) already runs on every PR inside CI / mobile-checks.
# Actions are SHA-pinned. ship-guard stays typing-free (IME harness bug).

# Runs on push to `main` (post-merge guard) and on pull_request — the releaseSafetyNet
# contract requires BOTH the push: and pull_request: triggers, and this keeps them.
#
# Why push is scoped to `main` (previously: all branches): on a PR branch the
# pull_request event already runs this job once. An UNSCOPED push: fired a SECOND,
# simultaneous 45-min emulator run on the very same commit — the two never deduped
# because the `concurrency` group below is keyed on github.ref, which differs between the
# push event (refs/heads/<branch>) and the pull_request event (refs/pull/<n>/merge). The
# two runs then contended for the emulator until one hung, wedging the required
# "Maestro ship-guard (Android emulator)" check. Scoping push to `main` yields exactly
# one run per commit (pull_request on PR branches; push on main) while STILL guarding
# direct merges to main via the post-merge push run.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'hermes-mobile/**'
      - '.github/workflows/mobile-e2e.yml'
      - '.github/workflows/mobile-ota.yml'
  # NO `paths:` filter on pull_request. This job's check name is a REQUIRED status
  # check on `main`. A path-filtered workflow that does not trigger reports no check
  # at all, so GitHub blocks the PR forever — that is what stranded every PR touching
  # no hermes-mobile file (#87, #106, #114). A job SKIPPED via `if:` does report, and
  # branch protection treats a skipped required check as satisfied. So: always trigger
  # the workflow, and skip the expensive emulator job when mobile files are untouched.
  pull_request:
  # Merge queue dispatches merge_group (not pull_request). Required for both
  # Maestro ship-guard and stranger cold-start checks when main enforces merge queue.
  merge_group:

# Per-ref concurrency. A single GLOBAL group was tried to serialise the emulator, but
# GitHub keeps only ONE pending run per concurrency group: each new run cancelled the
# previously-queued one. Measured 2026-07-10 with 4 agents pushing: 18 of the last 20
# mobile-e2e runs ended `cancelled`, so this REQUIRED check almost never reported and
# PRs could not merge. GitHub-hosted runners are isolated, so there is no shared
# emulator resource to protect — scope the group to the ref and cancel only this ref's
# own superseded runs.
concurrency:
  group: hermes-mobile-maestro-ship-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap gate (~20s): decides whether the emulator job is relevant to this PR.
  # On push/workflow_dispatch it always reports true so main keeps its post-merge guard.
  changes:
    name: Detect hermes-mobile changes
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: filter
        run: |
          set -eu
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "mobile=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" \
            | grep -qE '^(hermes-mobile/|\.github/workflows/mobile-(e2e|ota)\.yml$)'; then
            echo "mobile=true" >> "$GITHUB_OUTPUT"
          else
            echo "mobile=false" >> "$GITHUB_OUTPUT"
          fi

  android-e2e:
    name: Maestro ship-guard (Android emulator)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Validate Maestro flows (tier-0, fail fast before the emulator boots)
        run: npm run e2e:validate

      - name: Release safety net contract
        run: npm run test:release-safety

      - name: Enable KVM (hardware acceleration for the emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Gradle downloads NDK mid-build; GitHub runners occasionally get a corrupt NDK zip
      # ("ZipException: Archive is not a ZIP archive") which fails this REQUIRED check and
      # blocks every mobile PR. Pre-install NDK with wipe+retry before assemble.
      - name: Install Android NDK (retry on corrupt zip)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          # Expo SDK 55 / RN 0.83 on ubuntu-latest resolves ndk 27.1.12297006
          # (see failed #724/#743 ship-guard logs). Pre-installing 27.0 left a
          # partial directory without source.properties → CXX1101 while Gradle
          # also fetched 27.1.
          NDK_VERSION="27.1.12297006"
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}}"
          export ANDROID_HOME="$SDK_ROOT"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          mkdir -p "$SDK_ROOT/ndk"
          if ! command -v sdkmanager >/dev/null 2>&1; then
            if [ -x "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
              export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
            else
              echo "sdkmanager not found; letting Gradle fetch NDK (no pre-install)."
              exit 0
            fi
          fi
          # Wipe incomplete NDK trees (dir present, missing source.properties).
          if [ -d "${SDK_ROOT}/ndk" ]; then
            for ndk_dir in "${SDK_ROOT}/ndk"/*; do
              [ -d "$ndk_dir" ] || continue
              if [ ! -f "${ndk_dir}/source.properties" ]; then
                echo "Removing incomplete NDK dir: ${ndk_dir}"
                rm -rf "$ndk_dir"
              fi
            done
          fi
          install_ok=0
          for attempt in 1 2 3; do
            echo "NDK install attempt ${attempt}/3 (ndk;${NDK_VERSION})"
            rm -rf "${SDK_ROOT}/ndk/${NDK_VERSION}" \
              "${SDK_ROOT}/.temp" \
              "${SDK_ROOT}/.downloadIntermediates" 2>/dev/null || true
            if yes | sdkmanager --install "ndk;${NDK_VERSION}" >/tmp/ndk-install.log 2>&1; then
              # Directory presence alone is not enough — corrupt/partial installs leave
              # ndk/<ver> without source.properties and Gradle fails with CXX1101.
              if [ -f "${SDK_ROOT}/ndk/${NDK_VERSION}/source.properties" ]; then
                echo "NDK ready at ${SDK_ROOT}/ndk/${NDK_VERSION}"
                install_ok=1
                break
              fi
              echo "install reported success but source.properties missing; wiping"
              rm -rf "${SDK_ROOT}/ndk/${NDK_VERSION}"
            fi
            echo "attempt ${attempt} failed; tail:"
            tail -40 /tmp/ndk-install.log || true
            sleep 5
          done
          if [ "$install_ok" != "1" ]; then
            echo "WARN: pre-install NDK failed; Gradle may still recover"
            tail -80 /tmp/ndk-install.log || true
          else
            echo "ANDROID_NDK_HOME=${SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          fi
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Prebuild + assemble debug APK (x86_64 for the emulator)
        env:
          # CI-only: embed demo/dev deep links (hermes://setup?demo=1, leash-unlock) in the APK.
          # Production release builds must NOT set this — see install-phone-release.sh.
          EXPO_PUBLIC_E2E_AUTOMATION: "1"
          # No SENTRY_AUTH_TOKEN in CI — skip native sourcemap upload (T-121 / PR #71).
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          SENTRY_ALLOW_FAILURE: "true"
        run: |
          npx expo prebuild -p android --no-install
          (cd android && ./gradlew assembleDebug -PreactNativeArchitectures=x86_64 --no-daemon)

      - name: Run Maestro ship-guard on emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          working-directory: hermes-mobile
          # Harden the cold emulator boot so this required check stops flaking on
          # "device emulator-5554 not found" / boot timeout: headless swiftshader GPU,
          # no audio/boot-anim/snapshot/cameras, animations off, and a generous boot
          # timeout. All additive and reversible.
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none -camera-front none
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            export PATH="$HOME/.maestro/bin:$PATH"
            maestro test .maestro/ship-guard.yaml

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maestro-debug-output
          path: ~/.maestro/tests/**
          if-no-files-found: ignore

  # Brand-new user merge gate (T-342). ConnectMacGate is hidden when
  # EXPO_PUBLIC_E2E_AUTOMATION is baked into the APK — so this job builds a SEPARATE
  # debug APK with the flag forced off, clearState, no hermes://setup?demo=1.
  android-stranger-cold-start:
    name: Maestro stranger cold-start (Android emulator)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      # Structural contract only — this job *produces* the runtime proof; hard
      # runtime requirement would chicken-egg before Maestro runs.
      - name: Validate stranger cold-start contract (fail fast)
        run: node ./scripts/require-stranger-cold-start-proof.cjs --soft

      - name: Enable KVM (hardware acceleration for the emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Install Android NDK (retry on corrupt zip)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          # Expo SDK 55 / RN 0.83 on ubuntu-latest resolves ndk 27.1.12297006
          # (see failed #724/#743 ship-guard logs). Pre-installing 27.0 left a
          # partial directory without source.properties → CXX1101 while Gradle
          # also fetched 27.1.
          NDK_VERSION="27.1.12297006"
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}}"
          export ANDROID_HOME="$SDK_ROOT"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          mkdir -p "$SDK_ROOT/ndk"
          if ! command -v sdkmanager >/dev/null 2>&1; then
            if [ -x "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
              export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
            else
              echo "sdkmanager not found; letting Gradle fetch NDK (no pre-install)."
              exit 0
            fi
          fi
          # Wipe incomplete NDK trees (dir present, missing source.properties).
          if [ -d "${SDK_ROOT}/ndk" ]; then
            for ndk_dir in "${SDK_ROOT}/ndk"/*; do
              [ -d "$ndk_dir" ] || continue
              if [ ! -f "${ndk_dir}/source.properties" ]; then
                echo "Removing incomplete NDK dir: ${ndk_dir}"
                rm -rf "$ndk_dir"
              fi
            done
          fi
          install_ok=0
          for attempt in 1 2 3; do
            echo "NDK install attempt ${attempt}/3 (ndk;${NDK_VERSION})"
            rm -rf "${SDK_ROOT}/ndk/${NDK_VERSION}" \
              "${SDK_ROOT}/.temp" \
              "${SDK_ROOT}/.downloadIntermediates" 2>/dev/null || true
            if yes | sdkmanager --install "ndk;${NDK_VERSION}" >/tmp/ndk-install.log 2>&1; then
              if [ -f "${SDK_ROOT}/ndk/${NDK_VERSION}/source.properties" ]; then
                echo "NDK ready at ${SDK_ROOT}/ndk/${NDK_VERSION}"
                install_ok=1
                break
              fi
              echo "install reported success but source.properties missing; wiping"
              rm -rf "${SDK_ROOT}/ndk/${NDK_VERSION}"
            fi
            echo "attempt ${attempt} failed; tail:"
            tail -40 /tmp/ndk-install.log || true
            sleep 5
          done
          if [ "$install_ok" != "1" ]; then
            echo "WARN: pre-install NDK failed; Gradle may still recover"
            tail -80 /tmp/ndk-install.log || true
          else
            echo "ANDROID_NDK_HOME=${SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          fi
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      # STRANGER_COLD_START_ASSEMBLE — must keep EXPO_PUBLIC_E2E_AUTOMATION=0 so ConnectMacGate shows.
      - name: Prebuild + assemble stranger debug APK (no E2E hide-gate)
        env:
          EXPO_PUBLIC_E2E_AUTOMATION: "0"
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          SENTRY_ALLOW_FAILURE: "true"
        run: |
          unset EXPO_PUBLIC_HERMES_DEV_UNLOCK || true
          npx expo prebuild -p android --no-install
          (cd android && ./gradlew assembleDebug -PreactNativeArchitectures=x86_64 --no-daemon)

      - name: Run Maestro stranger cold-start on emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          working-directory: hermes-mobile
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none -camera-front none
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            export PATH="$HOME/.maestro/bin:$PATH"
            maestro test .maestro/stranger-cold-start.yaml

      - name: Upload stranger Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maestro-stranger-cold-start-debug
          path: ~/.maestro/tests/**
          if-no-files-found: ignore
