name: ASC screenshots upload

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "Live App Store version string (Hermes Mobile listing)"
        required: true
        default: "1.3"
        type: string
      skip_dedupe:
        description: "Skip post-upload dedupe (use when ASC returns STATE_ERROR on delete)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  upload:
    name: Upload iOS screenshots to ASC
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      # Public Hermes Mobile ASC app id — do not rely on EXPO_ASC_APP_ID secret (was LipoShield id).
      EXPO_ASC_APP_ID: "6786778037"
      ASC_APP_VERSION: ${{ inputs.app_version }}
      ASC_USE_LIVE_VERSION: "1"
      ASC_SKIP_METADATA: "1"
      ASC_SKIP_DEDUPE: ${{ inputs.skip_dedupe }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby (fastlane)
        uses: ruby/setup-ruby@4f8a715e0361483a4b5e3a832ca9451066a1f0a8 # v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Prepare App Store Connect API key
        env:
          EXPO_ASC_API_KEY_BASE64: ${{ secrets.EXPO_ASC_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_ASC_API_KEY_BASE64:-}" ]; then
            echo "::error::Missing GitHub secret EXPO_ASC_API_KEY_BASE64"
            exit 1
          fi
          printf '%s' "$EXPO_ASC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "EXPO_ASC_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Upload screenshots via ASC API (fastlane deliver)
        working-directory: hermes-mobile
        env:
          EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
          EXPO_ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail
          for v in EXPO_ASC_API_KEY_ID EXPO_ASC_API_KEY_ISSUER_ID EXPO_ASC_API_KEY_PATH; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing $v (set GitHub secret or prior step output)"
              exit 1
            fi
          done
          bash scripts/upload-app-store-metadata.sh

      - name: Verify ASC screenshot inventory
        working-directory: hermes-mobile
        env:
          EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
          EXPO_ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail
          node scripts/verify-asc-listing.js

      - name: Poll iTunes public screenshot count
        working-directory: hermes-mobile
        run: bash scripts/poll-itunes-ios-live.sh
