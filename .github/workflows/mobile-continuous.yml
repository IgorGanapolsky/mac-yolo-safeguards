name: Hermes Mobile Continuous

on:
  schedule:
    # Every 6 hours — autonomous cloud verification when Mac is offline
    - cron: '20 */6 * * *'
  pull_request:
    paths:
      - 'hermes-mobile/**'
      - '.github/workflows/mobile-continuous.yml'
  workflow_dispatch:

concurrency:
  group: hermes-mobile-continuous
  cancel-in-progress: false

jobs:
  unit-and-contract:
    name: Unit + release safety
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:ci

      - name: Release safety contract
        run: npm run test:release-safety

  release-apk-guard:
    name: Release APK + embedded bundle
    runs-on: ubuntu-latest
    needs: unit-and-contract
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android (withEmbeddedJsBundle plugin)
        run: npx expo prebuild --platform android --non-interactive

      - name: Raise Gradle metaspace (prebuild regenerates gradle.properties)
        # Release APK builds OOM'd with "OutOfMemoryError: Metaspace" at the
        # Expo-default 512m. android/ is gitignored + regenerated by prebuild,
        # so override here (last key wins) instead of in the committed file.
        # Keep workers low on GitHub's 7GB Linux runner; parallel Kotlin JVMs
        # have repeatedly exhausted metaspace before APK verification can run.
        run: |
          {
            echo 'org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8'
            echo 'org.gradle.workers.max=1'
            echo 'org.gradle.parallel=false'
            echo 'kotlin.compiler.execution.strategy=in-process'
            echo 'kotlin.daemon.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=1024m'
          } >> android/gradle.properties

      - name: Assert debuggableVariants guard in generated Gradle
        run: grep -F 'debuggableVariants = []' android/app/build.gradle

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon --no-parallel --max-workers=1 -PreactNativeArchitectures=arm64-v8a

      - name: Verify embedded JS bundle
        run: node scripts/verify-apk-package.cjs android/app/build/outputs/apk/release/app-release.apk

  macos-maestro-smoke:
    name: Maestro ship-guard (macOS sim)
    # macos-latest began migrating to macOS 26 in June 2026; Expo's current
    # iOS native deps fail Swift compilation there before Maestro can run.
    runs-on: macos-15
    needs: unit-and-contract
    # Run on PRs too (not just manual dispatch) so launch/runtime regressions are
    # caught before merge — e.g. the otel v2 crash that only surfaces at app launch
    # and which unit tests + a build job cannot detect. Make this a required check
    # in branch protection to block merges on E2E failure.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    timeout-minutes: 45
    defaults:
      run:
        working-directory: hermes-mobile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Java 17
        run: brew install openjdk@17

      - name: Install Maestro
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro ship-guard on iOS simulator
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: '180000'
          JAVA_HOME: /opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
        run: |
          export PATH="$JAVA_HOME/bin:$HOME/.maestro/bin:$PATH"
          bash ./scripts/run-simulator-e2e.sh .maestro/ship-guard.yaml
