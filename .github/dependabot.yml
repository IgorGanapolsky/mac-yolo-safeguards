version: 2
updates:
  - package-ecosystem: npm
    directory: /hermes-mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Expo SDK 55 manages these at EXACT versions (expo-doctor gate fails on
      # ANY bump, even patch — PR #58). They move only via `npx expo install
      # --fix` during an SDK upgrade. No update-types = ignore all updates.
      - dependency-name: react-native
      - dependency-name: react
      - dependency-name: react-native-screens
      - dependency-name: react-native-safe-area-context
      - dependency-name: "@shopify/flash-list"
      - dependency-name: expo
        update-types: ["version-update:semver-major"]
      - dependency-name: expo-*
        update-types: ["version-update:semver-major"]
      - dependency-name: jest-expo
        update-types: ["version-update:semver-major"]
      # v3 requires RN >=0.84 / new arch; app is on SDK 55 (RN 0.83) — PR #60
      - dependency-name: "@react-native-async-storage/async-storage"
        update-types: ["version-update:semver-major"]
      # v14 makes render() async — requires rewriting every test suite (PR #54)
      - dependency-name: "@testing-library/react-native"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
