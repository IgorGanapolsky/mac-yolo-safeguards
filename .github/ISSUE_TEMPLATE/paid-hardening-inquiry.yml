name: Paid hardening inquiry
description: Public-safe intake for diagnostic, hardening sprint, or partner pilot fit.
title: "[paid-hardening] "
labels:
  - paid-inquiry
  - paid-hardening
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Use this only for a public-safe summary. Do **not** post secrets, client names, private repository details, API keys, payment data, or proprietary logs.

        For private details, email `iganapolsky@gmail.com` or book a 20-minute triage: https://cal.com/igor-g-kvqxfo/30min
  - type: dropdown
    id: route
    attributes:
      label: Likely paid route
      description: Choose the closest fit.
      options:
        - Agent Reliability Diagnostic ($499)
        - AI Agent Hardening Sprint ($1,500)
        - Partner Pilot ($3,000)
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: buyer_type
    attributes:
      label: Buyer type
      options:
        - Founder / solo operator
        - AI automation agency
        - Consultant / implementation partner
        - Internal dev team
        - Other
    validations:
      required: true
  - type: input
    id: agent_stack
    attributes:
      label: Agent stack
      description: Keep this public-safe.
      placeholder: "Example: Claude Code + MCP tools"
    validations:
      required: true
  - type: textarea
    id: repeated_failure
    attributes:
      label: Repeated failure pattern
      description: Describe the repeated behavior without private details.
      placeholder: "Example: The agent retries the same broken fix and burns several hours of tool calls."
    validations:
      required: true
  - type: textarea
    id: business_cost
    attributes:
      label: Business cost
      description: Public-safe estimate of hours, spend, delivery risk, or client trust impact.
      placeholder: "Example: About 6 engineering hours per incident, twice this month."
    validations:
      required: true
  - type: textarea
    id: success_proof
    attributes:
      label: What would prove this is fixed?
      description: Public-safe success criteria.
      placeholder: "Example: The workflow escalates before the same bad tool loop repeats."
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety and payment expectations
      options:
        - label: I did not include secrets, private repository content, customer data, or payment data.
          required: true
        - label: I understand payment is due before implementation work starts.
          required: true
        - label: I understand this offer is scoped to one repeated failure pattern, not a blanket guarantee.
          required: true
