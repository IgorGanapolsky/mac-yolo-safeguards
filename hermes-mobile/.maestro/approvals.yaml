# Flow 3: ThumbGate Leash tab — smoke-test approval card (release-safe, no __DEV__ demo mode)
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "tab-leash"
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "leash-smoke-test"
    direction: DOWN
    timeout: 90000
- tapOn:
    id: "leash-smoke-test"
- scrollUntilVisible:
    element:
      id: "leash-thumbs-up"
    direction: UP
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "leash-thumbs-up"
    timeout: 10000
- assertVisible:
    id: "leash-thumbs-down"
- assertVisible:
    id: "leash-thumbs-up"
- tapOn:
    id: "leash-thumbs-up"
- scrollUntilVisible:
    element:
      id: "no-pending-approvals"
    direction: UP
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "no-pending-approvals"
    timeout: 10000
