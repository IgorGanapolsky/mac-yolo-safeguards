# Flow 3: Approvals override simulation flow
appId: com.iganapolsky.hermesmobile
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "HERMES MOBILE"
    timeout: 15000

- tapOn:
    id: "inject-demo-approval"
- extendedWaitUntil:
    visible: "GATE BLOCKED"
    timeout: 10000
- assertVisible: "APPROVE OVERRIDE"
- assertVisible: "REJECT"
- tapOn: "APPROVE OVERRIDE"
- extendedWaitUntil:
    visible: "No pending approvals"
    timeout: 10000
