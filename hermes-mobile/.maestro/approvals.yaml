# Flow 3: Leash tab — smoke-test approval card (release-safe, no __DEV__ demo mode)
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      id: "SETTINGS"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "gateway-url-input"
    direction: UP
    timeout: 60000
- scrollUntilVisible:
    element:
      id: "leash-smoke-test"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "leash-smoke-test"
- tapOn: "Leash"
- extendedWaitUntil:
    visible:
      id: "LEASH"
    timeout: 30000
- extendedWaitUntil:
    visible: "THUMBGATE · BLOCKED"
    timeout: 10000
- assertVisible:
    id: "leash-thumbs-down"
- assertVisible:
    id: "leash-thumbs-up"
- tapOn:
    id: "leash-thumbs-up"
- extendedWaitUntil:
    visible: "No pending approvals"
    timeout: 10000
