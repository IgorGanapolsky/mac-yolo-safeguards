# Flow 3: Leash tab — demo GATE.BLOCKED approve flow
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow:
    when:
      notVisible:
        id: "HERMES CHAT"
    commands:
      - tapOn: "Chat"
- extendedWaitUntil:
    visible:
      id: "HERMES CHAT"
    timeout: 30000

- tapOn: "Leash"
- assertVisible:
    id: "LEASH"
- tapOn:
    id: "inject-demo-approval"
- extendedWaitUntil:
    visible: "GATE BLOCKED"
    timeout: 10000
- assertVisible: "APPROVE OVERRIDE"
- assertVisible: "REJECT"
- tapOn: "APPROVE OVERRIDE"
- extendedWaitUntil:
    visible: "No pending approvals"
    timeout: 10000
