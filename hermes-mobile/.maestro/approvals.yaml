# Flow 3: Pro tab — paid approval controls without fake production smoke-test UI
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "tab-leash"
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "pro-options-card"
    direction: DOWN
    timeout: 90000
- scrollUntilVisible:
    element:
      id: "glance-mode-switch"
    direction: DOWN
    timeout: 60000
- assertVisible:
    id: "glance-mode-switch"
- assertVisible: "Thumbs down → remember block"
- assertVisible: "Thumbs up → record approval"
- assertNotVisible: "Preview approval card (smoke test)"
- assertNotVisible: "smoke test"
- scrollUntilVisible:
    element:
      id: "THUMBGATE_LEASH"
    direction: UP
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 10000
