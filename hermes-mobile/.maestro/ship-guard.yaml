# Ship guard — blocks Metro crash APKs and legacy native shell UI
appId: com.iganapolsky.hermesmobile
---
- launchApp
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 90000
- runFlow: dismiss-print-interruption.yaml
# Chat-only bootstrap — e2e-bootstrap's Leash round-trip drops demo composer on CI emulator.
- runFlow: chat-e2e-bootstrap.yaml

# Metro / debug crash screen
- assertNotVisible: "Unable to load script"
- assertNotVisible: "Make sure you're running Metro"

# ErrorBoundary crash (recurring FlashList "Maximum update depth exceeded" — #676/#697/#717).
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Maximum update depth exceeded"

# Legacy native shell (wrong app)
- assertNotVisible: "Hold the cord on your AI"
- assertNotVisible: "Connect your computer"
- assertNotVisible: "Hermes Mobile Agent"

# Async heal can drop demo composer seconds after bootstrap on CI emulator.
- openLink: "hermes://setup?demo=1&recover=1"
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 30000

# Async heal can hide composer on paired devices — recover re-opens Chat and scrolls input into view.
- runFlow: recover-chat-tab.yaml

# Composer must stay tappable while keyboard is open (regression #91 / translateY hit-rect).
- runFlow: regression-composer-typeable.yaml

# Send burst + tab remount + keyboard toggle storm must never trip the FlashList
# max-update-depth ErrorBoundary (recurring crash — see flow file for history).
- runFlow: regression-flashlist-max-depth.yaml

# Leash tab (THUMBGATE_LEASH) is covered by e2e-bootstrap / regression-leash-refresh.
# Device ship-guard ends at SETTINGS — Leash deep-link is flaky after demo re-bootstrap.
- runFlow: hide-keyboard-safe.yaml
- openLink: "hermes://settings"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- runFlow: hide-keyboard-safe.yaml
- runFlow:
    when:
      notVisible:
        id: "SETTINGS"
    commands:
      - runFlow: hide-keyboard-safe.yaml
      - tapOn:
          id: "tab-settings"
- extendedWaitUntil:
    visible:
      id: "SETTINGS"
    timeout: 90000
# SETTINGS title proves Settings tab loaded; Maestro scroll inside Settings ScrollView is flaky on CI emulator.
