# Ship guard — blocks Metro crash APKs and legacy native shell UI
appId: com.iganapolsky.hermesmobile
---
- launchApp
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 90000
- runFlow: dismiss-print-interruption.yaml
- runFlow: e2e-bootstrap.yaml

# Metro / debug crash screen
- assertNotVisible: "Unable to load script"
- assertNotVisible: "Make sure you're running Metro"

# Legacy native shell (wrong app)
- assertNotVisible: "Hold the cord on your AI"
- assertNotVisible: "Connect your computer"
- assertNotVisible: "Hermes Mobile Agent"

# Bootstrap ends on Leash — recover Chat with composer before continuing tab checks.
- runFlow: recover-chat-tab.yaml

- hideKeyboard
- openLink: "hermes://leash"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- hideKeyboard
- runFlow:
    when:
      notVisible:
        id: "THUMBGATE_LEASH"
    commands:
      - hideKeyboard
      - tapOn:
          id: "tab-leash"
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 90000

- openLink: "hermes://settings"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "SETTINGS"
    timeout: 45000

- hideKeyboard
- scrollUntilVisible:
    element:
      id: "GATEWAY_OPS"
    direction: DOWN
    timeout: 90000
    visibilityPercentage: 50
- extendedWaitUntil:
    visible:
      id: "gateway-ops-section"
    timeout: 45000
