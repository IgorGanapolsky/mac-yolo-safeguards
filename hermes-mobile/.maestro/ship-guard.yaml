# Ship guard — blocks Metro crash APKs and legacy native shell UI
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml

# Metro / debug crash screen
- assertNotVisible: "Unable to load script"
- assertNotVisible: "Make sure you're running Metro"

# Legacy native shell (wrong app)
- assertNotVisible: "Hold the cord on your AI"
- assertNotVisible: "Connect your computer"
- assertNotVisible: "Hermes Mobile Agent"

- runFlow:
    when:
      notVisible:
        id: "chat-screen-header"
    commands:
      - openLink: "hermes://chat"

- extendedWaitUntil:
    visible:
      id: "chat-screen-header"
    timeout: 30000

- hideKeyboard
- scrollUntilVisible:
    element:
      id: "chat-input"
    direction: UP
    timeout: 45000
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000

- hideKeyboard
- openLink: "hermes://leash"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 45000

- openLink: "hermes://settings"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "SETTINGS"
    timeout: 45000

- hideKeyboard
- scrollUntilVisible:
    element:
      id: "gateway-ops-section"
    direction: DOWN
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "gateway-ops-section"
    timeout: 45000
