# Chat send — user bubble must stay visible (guards refresh-race / virtualization regression).
#
# ROOT CAUSE NOTE (open harness bug, not solely app bug):
# On Android, Maestro `inputText` often leaves RN TextInput empty (IME composing region), so
# Send taps with blank composer and this flow fails even when unit optimistic-send tests pass
# (see plan.md T-70 Decision Log 2026-07-04). Desired product behavior is still asserted here
# so CI/device E2E fail closed once IME input is fixed or a clipboard-paste path is adopted.
# Continuous E2E still runs this flow; PR emulator gate uses ship-guard only (no typing).
appId: com.iganapolsky.hermesmobile
---
- launchApp
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 90000
- runFlow: dismiss-print-interruption.yaml
- runFlow: chat-e2e-bootstrap.yaml
- runFlow:
    when:
      notVisible:
        id: "HERMES CHAT"
    commands:
      - tapOn:
          id: "tab-hermes"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000
- tapOn:
    id: "chat-input"
- eraseText
- inputText: "make money today"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: hide-keyboard-safe.yaml
- tapOn:
    id: "chat-send-button"
# Prefer stable testID; scroll first because long sessions virtualize off-screen bubbles.
- scrollUntilVisible:
    element:
      id: "chat-message-user"
    direction: UP
    timeout: 20000
    speed: 40
- extendedWaitUntil:
    visible:
      id: "chat-message-user"
    timeout: 15000
- assertVisible:
    id: "chat-message-user"
- assertVisible: "e2e-chat-send-persist"
