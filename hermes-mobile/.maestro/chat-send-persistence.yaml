# Chat send — user bubble must stay visible (guards refresh-race regression).
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- runFlow:
    when:
      notVisible:
        id: "HERMES CHAT"
    commands:
      - tapOn:
          id: "tab-hermes"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000
- tapOn:
    id: "chat-input"
- eraseText
- inputText: "print money, make money faster. Use Data Science, ML and Agentic RAG."
- waitForAnimationToEnd:
    timeout: 2000
- hideKeyboard
- tapOn:
    id: "chat-send-button"
# User bubble is the persistence signal — run-progress-banner hides until runId (demo clears it fast).
# Scroll first: long live sessions virtualize off-screen bubbles until offset-0 (latest) is shown.
- scrollUntilVisible:
    element:
      text: "print money, make money faster. Use Data Science, ML and Agentic RAG."
    direction: UP
    timeout: 20000
    speed: 40
- extendedWaitUntil:
    visible: "print money, make money faster. Use Data Science, ML and Agentic RAG."
    timeout: 15000
- assertVisible: "print money, make money faster. Use Data Science, ML and Agentic RAG."
- extendedWaitUntil:
    visible: "print money, make money faster. Use Data Science, ML and Agentic RAG."
    timeout: 8000
- assertVisible: "print money, make money faster. Use Data Science, ML and Agentic RAG."
