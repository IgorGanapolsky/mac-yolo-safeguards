# Chat send — user bubble must stay visible (guards refresh-race / virtualization regression).
#
# Search for the exact submitted prompt. A generic `chat-message-user` lookup can match the
# preloaded demo prompt and scroll away from the newly sent bubble, producing a false failure.
# Android IME composition can still prevent Maestro `inputText` from reaching React Native;
# that is a separate fail-closed harness risk and must not weaken this content assertion.
appId: com.iganapolsky.hermesmobile
---
- launchApp
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 90000
- runFlow: dismiss-print-interruption.yaml
- runFlow: chat-e2e-bootstrap.yaml
- runFlow:
    when:
      notVisible:
        id: "HERMES CHAT"
    commands:
      - tapOn:
          id: "tab-hermes"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000
- tapOn:
    id: "chat-input"
- eraseText
- inputText: "make money today"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: hide-keyboard-safe.yaml
# Emulator/phone dogfood often resumes a 100k+ token thread; banner blocks Send.
- runFlow: dismiss-mega-session-warn.yaml
- tapOn:
    id: "chat-send-button"
# Send on a warn-level mega session opens Alert — start fresh then retype/send.
- runFlow:
    when:
      visible: "Very large chat session"
    commands:
      - tapOn: "Start fresh chat"
      - extendedWaitUntil:
          visible:
            id: "chat-input"
          timeout: 30000
      - tapOn:
          id: "chat-input"
      - eraseText
      - inputText: "make money today"
      - waitForAnimationToEnd:
          timeout: 2000
      - runFlow: hide-keyboard-safe.yaml
      - tapOn:
          id: "chat-send-button"
# Long sessions can virtualize the new bubble below the preloaded transcript. Search in the
# direction of newer messages and match the prompt itself, never an arbitrary user bubble.
- scrollUntilVisible:
    element:
      text: "make money today"
    direction: DOWN
    timeout: 20000
    speed: 40
- extendedWaitUntil:
    visible:
      text: "make money today"
    timeout: 15000
- assertVisible: "make money today"
