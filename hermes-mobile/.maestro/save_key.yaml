appId: com.iganapolsky.hermesmobile
---
- launchApp
- tapOn: "Settings"
- assertVisible:
    id: "SETTINGS"
- scrollUntilVisible:
    element:
      id: "gateway-api-key-input"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "gateway-api-key-input"
- inputText: "sk-hermes-api-server-key-2026-06-15"
- runFlow:
    when:
      platform: android
    commands:
      - back
- runFlow:
    when:
      platform: ios
    commands:
      - hideKeyboard
- scrollUntilVisible:
    element:
      text: "SAVE CONFIGURATION"
    direction: DOWN
    timeout: 60000
    speed: 65
    visibilityPercentage: 50
- tapOn:
    id: "save-settings-button"
- tapOn: "OK"
- tapOn: "Chat"
- extendedWaitUntil:
    visible:
      id: "HERMES CHAT"
    timeout: 30000
