appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- tapOn:
    id: "tab-settings"
- assertVisible:
    id: "SETTINGS"
- scrollUntilVisible:
    element:
      id: "gateway-api-key-input"
    direction: DOWN
    timeout: 60000
    speed: 35
    visibilityPercentage: 40
- tapOn:
    id: "gateway-api-key-input"
- inputText: "sk-hermes-api-server-key-2026-06-15"
- runFlow:
    when:
      platform: android
    commands:
      - back
- runFlow:
    when:
      platform: ios
    commands:
      - hideKeyboard
- scrollUntilVisible:
    element:
      id: "save-settings-button"
    direction: DOWN
    timeout: 60000
    speed: 35
    visibilityPercentage: 40
- tapOn:
    id: "save-settings-button"
- tapOn: "OK"
- tapOn: "Hermes"
- extendedWaitUntil:
    visible:
      id: "HERMES CHAT"
    timeout: 30000
