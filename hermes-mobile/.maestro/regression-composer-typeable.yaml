# Regression for the #91 OTA "keyboard opens, can't type" bug: the composer was lifted
# above the keyboard with transform:translateY, which on Android leaves the TextInput's
# touch hit-rect behind — visible but UNTAPPABLE. The fix uses layout marginBottom so the
# hit-rect moves with the input.
#
# 2026-07-13 evidence: append-with-caret-at-end is flaky on Samsung Gboard — a second
# tap often leaves the caret mid-string so "-probe-2" inserts as typeable-probe-probe-2-1.
# Prove the open-keyboard re-tap path by erase+retype while the dock is lifted instead.
appId: com.iganapolsky.hermesmobile
---
- launchApp
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 90000
- runFlow: dismiss-print-interruption.yaml
- runFlow: chat-e2e-bootstrap.yaml
- runFlow:
    when:
      notVisible:
        id: "chat-input"
    commands:
      - tapOn:
          id: "tab-hermes"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000
# First tap: keyboard closed -> focuses -> keyboard opens and the dock lifts (marginBottom>0).
- tapOn:
    id: "chat-input"
- eraseText
- inputText: "make money today"
- assertVisible: "make money today"
# CRITICAL: keyboard OPEN and dock lifted. Re-tap the lifted composer, erase, retype.
# Under translateY the hit-rect is left behind — erase/input miss and retype never lands.
# With marginBottom the input stays tappable. Standing rule: only "make money today" in chat.
- tapOn:
    id: "chat-input"
- eraseText
- inputText: "make money today"
- assertVisible: "make money today"
- eraseText
