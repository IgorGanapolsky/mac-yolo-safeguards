# Chat-only Maestro bootstrap — skips Leash tab (ship-guard validates Leash screen).
appId: com.iganapolsky.hermesmobile
---
- openLink: "hermes://setup?demo=1"
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn: "Open"
- runFlow: dismiss-print-interruption.yaml
# Wait for async demo setup (navigates to Chat) before leash-unlock.
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 90000
- openLink: "hermes://chat"
- runFlow:
    when:
      notVisible:
        id: "chat-screen-header"
    commands:
      - hideKeyboard
      - tapOn:
          id: "tab-hermes"
- extendedWaitUntil:
    notVisible:
      id: "connect-mac-gate"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "chat-screen-header"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 90000
- hideKeyboard
- openLink: "hermes://dev/leash-unlock"
- hideKeyboard
- openLink: "hermes://chat"
- runFlow: dismiss-print-interruption.yaml
- runFlow:
    when:
      notVisible:
        id: "chat-screen-header"
    commands:
      - hideKeyboard
      - tapOn:
          id: "tab-hermes"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "chat-screen-header"
    timeout: 90000
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 90000
