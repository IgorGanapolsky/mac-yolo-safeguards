# Chat-only Maestro bootstrap — skips Leash tab (ship-guard validates Leash screen).
# setup?demo=1 already sets developerLeashUnlock on E2E builds — do NOT re-open
# the dev leash-unlock deep link here; it navigates to Leash and drops demo composer.
appId: com.iganapolsky.hermesmobile
---
- openLink: "hermes://setup?demo=1"
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn: "Open"
- runFlow: dismiss-print-interruption.yaml
- runFlow: dismiss-mac-picker.yaml
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 90000
- openLink: "hermes://chat"
- runFlow: dismiss-mac-picker.yaml
- runFlow:
    when:
      notVisible:
        id: "chat-screen-header"
    commands:
      - runFlow: hide-keyboard-safe.yaml
      - tapOn:
          id: "tab-hermes"
- extendedWaitUntil:
    notVisible:
      id: "connect-mac-gate"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "chat-screen-header"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 90000
- runFlow: hide-keyboard-safe.yaml
# Prefer chat-input over chat-composer-dock — CI Maestro often fails dock visibility
# even when the input (child) is already visible; ship-guard only needs chat-input.
