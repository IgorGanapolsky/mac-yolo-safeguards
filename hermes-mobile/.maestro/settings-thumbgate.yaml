# Pro tab — scroll through paid options without fake production smoke-test UI
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- tapOn:
    id: "tab-leash"
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "pro-options-card"
    direction: DOWN
    timeout: 90000
- assertNotVisible: "Preview approval card (smoke test)"
- assertNotVisible: "smoke test"
- scrollUntilVisible:
    element:
      id: "glance-mode-switch"
    direction: DOWN
    timeout: 60000
- assertVisible:
    id: "glance-mode-switch"
