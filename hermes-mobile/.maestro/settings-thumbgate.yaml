# Settings — scroll through ThumbGate region (above leash-smoke-test) to save button
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      id: "SETTINGS"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "gateway-url-input"
    direction: UP
    timeout: 60000
- scrollUntilVisible:
    element:
      id: "leash-smoke-test"
    direction: DOWN
    timeout: 30000
- assertVisible:
    id: "leash-smoke-test"
- scrollUntilVisible:
    element:
      id: "save-settings-button"
    direction: DOWN
    timeout: 60000
- assertVisible:
    id: "save-settings-button"
