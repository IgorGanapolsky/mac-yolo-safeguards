# Leash tab — scroll through Leash options to smoke test
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- tapOn: "Leash"
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "leash-smoke-test"
    direction: DOWN
    timeout: 90000
- assertVisible:
    id: "leash-smoke-test"
- scrollUntilVisible:
    element:
      id: "glance-mode-switch"
    direction: DOWN
    timeout: 60000
- assertVisible:
    id: "glance-mode-switch"
