# Fresh user paid upgrade path — no Pro, no demo unlock.
# Android: lifetime IAP CTA (subscribe-thumbgate-leash-iap).
# iOS: web subscription CTA (open-thumbgate-web-subscription) — no StoreKit subs.
# Does not complete real purchase; asserts UI + tap without crashing.
appId: com.iganapolsky.hermesmobile
---
- runFlow:
    when:
      visible:
        id: "connect-mac-gate-dismiss"
    commands:
      - tapOn:
          id: "connect-mac-gate-dismiss"
- runFlow:
    when:
      visible:
        id: "mac-picker-modal-backdrop"
    commands:
      - tapOn:
          id: "mac-picker-modal-backdrop"
- runFlow: hide-keyboard-safe.yaml
- runFlow: dismiss-logbox.yaml
- tapOn:
    id: "tab-leash"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 30000
# Free tier: pro-upgrade-card is near top under leash-pro-upsell-card.
# Locked (no free remaining): same testIDs on the locked empty card.
- extendedWaitUntil:
    visible:
      id: "leash-pro-upsell-card"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "pro-upgrade-card"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 40
    centerElement: true
- assertVisible:
    id: "pro-upgrade-card"
- assertVisible:
    id: "restore-thumbgate-leash"
- assertVisible:
    id: "subscription-legal-disclosure"
# Platform CTA: Android lifetime IAP or iOS web dashboard (never StoreKit monthly).
- runFlow:
    when:
      visible:
        id: "subscribe-thumbgate-leash-iap"
    commands:
      - assertVisible:
          id: "subscribe-thumbgate-leash-iap"
      - tapOn:
          id: "subscribe-thumbgate-leash-iap"
- runFlow:
    when:
      visible:
        id: "open-thumbgate-web-subscription"
    commands:
      - assertVisible:
          id: "open-thumbgate-web-subscription"
      - tapOn:
          id: "open-thumbgate-web-subscription"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 2000
# App must not crash after upgrade attempt — tabs still mounted.
- extendedWaitUntil:
    visible:
      id: "tab-leash"
    timeout: 15000
- assertVisible:
    id: "tab-leash"
- assertVisible:
    id: "tab-hermes"
