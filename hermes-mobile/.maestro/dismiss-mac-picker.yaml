# Dismiss Choose-your-computer sheet ONLY when mac-picker-modal is open.
# Bare text "Choose your computer" is the chat header a11y label when closed.
# After Close, wait until modal is gone (sheet can re-open during heal/pair).
appId: com.iganapolsky.hermesmobile
---
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              id: "mac-picker-modal"
          commands:
            - tapOn: "Close"
            - extendedWaitUntil:
                notVisible:
                  id: "mac-picker-modal"
                timeout: 5000
