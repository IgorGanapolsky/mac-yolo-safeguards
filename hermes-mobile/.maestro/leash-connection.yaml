# Pro tab — connection status visible when gateway healthy (Pro unlocked)
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- tapOn:
    id: "tab-leash"
- extendedWaitUntil:
    visible:
      id: "leash-connection-status"
    timeout: 30000
- assertVisible:
    id: "no-pending-approvals"
- scrollUntilVisible:
    element:
      id: "pro-options-card"
    direction: DOWN
    timeout: 30000
- assertNotVisible: "Preview approval card (smoke test)"
