# ThumbGate Leash tab — connection status visible when gateway healthy (Pro unlocked)
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml
- tapOn: "Settings"
- scrollUntilVisible:
    element:
      id: "unlock-thumbgate-leash"
    direction: DOWN
    timeout: 90000
- tapOn:
    id: "unlock-thumbgate-leash"
- tapOn: "Leash"
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 30000
- assertVisible:
    id: "leash-connection-status"
- assertVisible: "No pending approvals"
