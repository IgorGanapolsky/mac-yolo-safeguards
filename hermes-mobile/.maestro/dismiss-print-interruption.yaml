# Dismiss Canon/Android print sheets that steal focus during USB Maestro runs.
# IMPORTANT: never match bare text "Print" — that hits chat copy (e.g. "print money")
# and aborts ship-guard mid-flow via back/launchApp. Only match printer-sheet phrases.
appId: com.iganapolsky.hermesmobile
---
- repeat:
    times: 4
    commands:
      - runFlow:
          when:
            visible: "Do you want to use the following printer?"
          commands:
            - tapOn: "No"
      - runFlow:
          when:
            visible: "Select a printer"
          commands:
            - tapOn: "Cancel"
      - runFlow:
          when:
            visible: "Do you want to use the following printer?"
          commands:
            - back
      - waitForAnimationToEnd:
          timeout: 400
- runFlow:
    when:
      visible: "Do you want to use the following printer?"
    commands:
      - launchApp
