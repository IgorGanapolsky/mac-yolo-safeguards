# Flow 1: App launch — Chat tab is the Telegram replacement
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow:
    when:
      notVisible:
        id: "HERMES CHAT"
    commands:
      - tapOn: "Chat"
- extendedWaitUntil:
    visible:
      id: "HERMES CHAT"
    timeout: 30000
- assertVisible:
    id: "chat-input"
