# Recover demo Chat after Leash/other tabs — deep link first, tab bar fallback, assert chat-input.
appId: com.iganapolsky.hermesmobile
---
- runFlow: hide-keyboard-safe.yaml
- runFlow: dismiss-mac-picker.yaml
- openLink: "hermes://chat"
- runFlow: dismiss-print-interruption.yaml
- runFlow: dismiss-mac-picker.yaml
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- extendedWaitUntil:
    notVisible:
      id: "connect-mac-gate"
    timeout: 30000
- runFlow:
    when:
      notVisible:
        id: "chat-screen-header"
    commands:
      - runFlow: dismiss-mac-picker.yaml
      - runFlow: hide-keyboard-safe.yaml
      - extendedWaitUntil:
          visible:
            id: "tab-hermes"
          timeout: 30000
      - tapOn:
          id: "tab-hermes"
- runFlow:
    when:
      notVisible:
        id: "chat-screen-header"
    commands:
      - runFlow: dismiss-mac-picker.yaml
      - runFlow: hide-keyboard-safe.yaml
      - tapOn: "Hermes"
- extendedWaitUntil:
    visible:
      id: "chat-screen-header"
    timeout: 90000
- runFlow: hide-keyboard-safe.yaml
# Demo composer can drop after recover deep link on CI emulator — re-arm demo then assert input.
- runFlow:
    when:
      notVisible:
        id: "chat-input"
    commands:
      - openLink: "hermes://setup?demo=1&recover=1"
      - extendedWaitUntil:
          notVisible:
            id: "hermes-bootstrap"
          timeout: 30000
      - openLink: "hermes://chat"
      - runFlow: dismiss-mac-picker.yaml
      - extendedWaitUntil:
          visible:
            id: "chat-screen-header"
          timeout: 90000
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 90000
