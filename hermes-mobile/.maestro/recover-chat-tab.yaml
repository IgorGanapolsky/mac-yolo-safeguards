# Recover demo Chat after Leash/other tabs — deep link first, tab bar fallback, assert chat-input.
appId: com.iganapolsky.hermesmobile
---
- hideKeyboard
- openLink: "hermes://chat"
- runFlow: dismiss-print-interruption.yaml
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- extendedWaitUntil:
    notVisible:
      id: "connect-mac-gate"
    timeout: 30000
- runFlow:
    when:
      notVisible:
        id: "chat-screen-header"
    commands:
      - hideKeyboard
      - extendedWaitUntil:
          visible:
            id: "tab-hermes"
          timeout: 30000
      - tapOn:
          id: "tab-hermes"
- runFlow:
    when:
      notVisible:
        id: "chat-screen-header"
    commands:
      - hideKeyboard
      - tapOn: "Hermes"
- extendedWaitUntil:
    visible:
      id: "chat-screen-header"
    timeout: 90000
- hideKeyboard
# Prefer chat-input over chat-composer-dock — release Android often omits the dock
# parent from the a11y tree even when the composer is on screen (see chat-e2e-bootstrap).
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 90000
