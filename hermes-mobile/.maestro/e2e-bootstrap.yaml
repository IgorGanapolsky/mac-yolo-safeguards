# Shared cold-start bootstrap for Maestro (demo mode + full tab bar).
# Parent flows call launchApp first — no Expo dev-client URL (release APK on device).
appId: com.iganapolsky.hermesmobile
---
- openLink: "hermes://setup?demo=1"
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn: "Open"
- runFlow: dismiss-print-interruption.yaml
# setup?demo=1 is async — wait for demo Chat before leash-unlock or setup races back to Chat.
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 90000
- openLink: "hermes://chat"
- runFlow:
    when:
      notVisible:
        id: "chat-screen-header"
    commands:
      - hideKeyboard
      - tapOn:
          id: "tab-hermes"
- extendedWaitUntil:
    notVisible:
      id: "connect-mac-gate"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "chat-screen-header"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 90000
- hideKeyboard
- openLink: "hermes://dev/leash-unlock"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- hideKeyboard
- openLink: "hermes://leash"
# Android release: Maestro openLink may not switch tabs — tap Leash when deep link is a no-op.
- runFlow:
    when:
      notVisible:
        id: "THUMBGATE_LEASH"
    commands:
      - hideKeyboard
      - tapOn:
          id: "tab-leash"
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 90000
- runFlow:
    when:
      visible:
        id: "unlock-thumbgate-leash"
    commands:
      - scrollUntilVisible:
          element:
            id: "unlock-thumbgate-leash"
          direction: DOWN
          timeout: 30000
      - tapOn:
          id: "unlock-thumbgate-leash"
- scrollUntilVisible:
    element:
      id: "THUMBGATE_LEASH"
    direction: UP
    timeout: 90000
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
# Leave bootstrap on Leash — ship-guard / navigation flows recover Chat themselves.
# Returning to Chat here drops demo composer on CI after the Leash round-trip.
