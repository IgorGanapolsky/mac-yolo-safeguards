# Shared cold-start bootstrap for Maestro (demo mode + full tab bar).
# Parent flows call launchApp first — no Expo dev-client URL (release APK on device).
appId: com.iganapolsky.hermesmobile
---
- runFlow:
    when:
      visible:
        id: "connect-mac-gate"
    commands:
      - openLink: "hermes://setup?demo=1"
- extendedWaitUntil:
    notVisible:
      id: "connect-mac-gate"
    timeout: 30000
- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 45000
- runFlow:
    when:
      notVisible: "Chat"
    commands:
      - tapOn:
          text: "Settings"
      - extendedWaitUntil:
          visible:
            id: "SETTINGS"
          timeout: 30000
      - scrollUntilVisible:
          element:
            id: "glance-mode-switch"
          direction: DOWN
          timeout: 30000
      - runFlow:
          when:
            notVisible: "Chat"
          commands:
            - tapOn:
                id: "glance-mode-switch"
            - tapOn:
                id: "save-settings-button"
            - tapOn: "OK"
- tapOn:
    text: "Chat"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 90000
