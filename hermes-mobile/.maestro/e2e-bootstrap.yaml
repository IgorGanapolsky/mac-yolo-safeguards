# Shared cold-start bootstrap for Maestro (demo mode + full tab bar).
# Parent flows call launchApp first — no Expo dev-client URL (release APK on device).
appId: com.iganapolsky.hermesmobile
---
- openLink: "hermes://setup?demo=1"
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn: "Open"
- openLink: "hermes://dev/leash-unlock"
- extendedWaitUntil:
    notVisible:
      id: "connect-mac-gate"
    timeout: 30000
- hideKeyboard
# tab-* testIDs — never substring-match chat-connection-settings / onboarding copy.
- extendedWaitUntil:
    visible:
      id: "tab-hermes"
    timeout: 45000
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      notVisible:
        id: "THUMBGATE_LEASH"
    commands:
      - tapOn:
          id: "tab-leash"
      - extendedWaitUntil:
          notVisible:
            id: "tab-screen-loading"
          timeout: 90000
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible:
        id: "unlock-thumbgate-leash"
    commands:
      - scrollUntilVisible:
          element:
            id: "unlock-thumbgate-leash"
          direction: DOWN
          timeout: 30000
      - tapOn:
          id: "unlock-thumbgate-leash"
- scrollUntilVisible:
    element:
      id: "THUMBGATE_LEASH"
    direction: UP
    timeout: 90000
- hideKeyboard
- tapOn:
    id: "tab-hermes"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- waitForAnimationToEnd:
    timeout: 3000
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "HERMES CHAT"
    timeout: 45000
- scrollUntilVisible:
    element:
      id: "chat-input"
    direction: UP
    timeout: 90000
