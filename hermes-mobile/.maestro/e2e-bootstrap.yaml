# Shared cold-start bootstrap for Maestro (demo mode + full tab bar).
# Parent flows call launchApp first — no Expo dev-client URL (release APK on device).
appId: com.iganapolsky.hermesmobile
---
- openLink: "hermes://setup?demo=1"
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn: "Open"
- openLink: "hermes://dev/leash-unlock"
- extendedWaitUntil:
    notVisible:
      id: "connect-mac-gate"
    timeout: 30000
- hideKeyboard
- openLink: "hermes://leash"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 90000
- runFlow:
    when:
      visible:
        id: "unlock-thumbgate-leash"
    commands:
      - scrollUntilVisible:
          element:
            id: "unlock-thumbgate-leash"
          direction: DOWN
          timeout: 30000
      - tapOn:
          id: "unlock-thumbgate-leash"
- scrollUntilVisible:
    element:
      id: "THUMBGATE_LEASH"
    direction: UP
    timeout: 90000
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
# Tab bar taps fail on iOS sim when keyboard inset sets tab bar pointerEvents=none — deep link instead.
- openLink: "hermes://chat"
- extendedWaitUntil:
    visible:
      id: "chat-screen-header"
    timeout: 90000
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "chat-input"
    direction: UP
    timeout: 90000
