# Shared cold-start bootstrap for Maestro (demo mode + full tab bar).
# Parent flows call launchApp first — no Expo dev-client URL (release APK on device).
appId: com.iganapolsky.hermesmobile
---
- openLink: "hermes://setup?demo=1"
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn: "Open"
- extendedWaitUntil:
    notVisible:
      id: "connect-mac-gate"
    timeout: 30000
- hideKeyboard
# tab-* testIDs — never substring-match chat-connection-settings / onboarding copy.
- extendedWaitUntil:
    visible:
      id: "tab-leash"
    timeout: 45000
- extendedWaitUntil:
    visible:
      id: "tab-settings"
    timeout: 30000
- runFlow:
    when:
      notVisible:
        id: "THUMBGATE_LEASH"
    commands:
      - tapOn:
          id: "tab-leash"
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 30000
- runFlow:
    when:
      visible:
        id: "unlock-thumbgate-leash"
    commands:
      - tapOn:
          id: "unlock-thumbgate-leash"
- extendedWaitUntil:
    visible:
      id: "tab-hermes"
    timeout: 30000
- hideKeyboard
- runFlow:
    when:
      visible:
        id: "tab-hermes"
    commands:
      - tapOn:
          id: "tab-hermes"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 90000
