# Brand-new user cold start — NO demo deep link.
# Accepts any valid first-run shell:
#   A) ConnectMacGate onboarding
#   B) Mac picker (USB/local discovery)
#   C) Chat shell already reachable (emulator auto-discovery / reverse)
appId: com.iganapolsky.hermesmobile
---
- stopApp
- clearState
- launchApp
# First cold launch after install can spend >60s on native splash while Metro connects.
- extendedWaitUntil:
    notVisible:
      id: "hermes-bootstrap"
    timeout: 120000
- runFlow: dismiss-print-interruption.yaml
- runFlow: dismiss-logbox.yaml
# Accept either tab testID or chat shell (tab-hermes can lag one frame behind shell).
- extendedWaitUntil:
    visible:
      id: "tab-hermes"
    timeout: 120000
# Path A — full gate
- runFlow:
    when:
      visible:
        id: "connect-mac-gate"
    commands:
      - assertVisible:
          id: "connect-mac-onboarding-card"
      - assertVisible:
          id: "connect-search-wifi"
# Path B — picker
- runFlow:
    when:
      visible:
        id: "mac-picker-modal"
    commands:
      - assertVisible:
          id: "chat-find-macs-on-wifi"
      - tapOn:
          id: "mac-picker-modal-backdrop"
      - waitForAnimationToEnd:
          timeout: 2000
# Path C — chat already usable (still assert tabs)
- assertVisible:
    id: "tab-leash"
- assertVisible:
    id: "tab-settings"
