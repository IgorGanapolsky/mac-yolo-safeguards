# Flow 2: Tab navigation — Chat, Leash, Ops, Settings
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow:
    when:
      notVisible:
        id: "HERMES CHAT"
    commands:
      - tapOn: "Chat"
- extendedWaitUntil:
    visible:
      id: "HERMES CHAT"
    timeout: 30000

- tapOn: "Leash"
- assertVisible:
    id: "LEASH"

- tapOn: "Ops"
- extendedWaitUntil:
    visible:
      id: "OPS"
    timeout: 30000

- tapOn: "Settings"
- assertVisible:
    id: "SETTINGS"

- tapOn: "Chat"
- assertVisible:
    id: "HERMES CHAT"
