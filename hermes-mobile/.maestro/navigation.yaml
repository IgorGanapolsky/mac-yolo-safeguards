# Flow 2: Tab navigation — Hermes, Leash, Settings (Mac gateway ops live in Settings)
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml

- tapOn:
    id: "tab-leash"
- assertVisible:
    id: "THUMBGATE_LEASH"

- tapOn:
    id: "tab-settings"
- assertVisible:
    id: "SETTINGS"
- runFlow:
    when:
      platform: ios
    commands:
      - hideKeyboard
- scrollUntilVisible:
    element:
      id: "gateway-ops-section"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 40

- tapOn:
    id: "tab-hermes"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000
- assertVisible:
    id: "HERMES CHAT"
