# Flow 2: Tab navigation — Chat, Leash, Ops, Settings
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml

- tapOn: "Leash"
- assertVisible:
    id: "THUMBGATE_LEASH"

- tapOn: "Ops"
- extendedWaitUntil:
    visible:
      id: "OPS"
    timeout: 30000

- tapOn: "Settings"
- assertVisible:
    id: "SETTINGS"
- hideKeyboard

- tapOn: "Chat"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000
- assertVisible:
    id: "HERMES CHAT"
