# Flow 2: Tab navigation — Chat, Leash, Ops, Settings
appId: com.iganapolsky.hermesmobile
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "HERMES CHAT"
    timeout: 15000

- tapOn: "Leash"
- assertVisible: "LEASH"

- tapOn: "Ops"
- assertVisible: "OPS"

- tapOn: "Settings"
- assertVisible: "SETTINGS"

- tapOn: "Chat"
- assertVisible: "HERMES CHAT"
