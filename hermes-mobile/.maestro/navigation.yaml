# Flow 2: Tab navigation — Chat, Leash, Settings (Mac gateway ops live in Settings)
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml

- tapOn: "Leash"
- assertVisible:
    id: "THUMBGATE_LEASH"

- tapOn: "Settings"
- assertVisible:
    id: "SETTINGS"
- scrollUntilVisible:
    element:
      id: "GATEWAY_OPS"
    direction: DOWN
    timeout: 30000
- hideKeyboard

- tapOn: "Chat"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000
- assertVisible:
    id: "HERMES CHAT"
