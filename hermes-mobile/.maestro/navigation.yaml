# Flow 2: Tab navigation — Hermes, Pro, Settings (Mac gateway ops live in Settings)
appId: com.iganapolsky.hermesmobile
---
- launchApp
- runFlow: e2e-bootstrap.yaml

- tapOn:
    id: "tab-leash"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "THUMBGATE_LEASH"
    timeout: 30000

- tapOn:
    id: "tab-settings"
- extendedWaitUntil:
    notVisible:
      id: "tab-screen-loading"
    timeout: 90000
- assertVisible:
    id: "SETTINGS"
- runFlow:
    when:
      platform: ios
    commands:
      - hideKeyboard
- scrollUntilVisible:
    element:
      id: "gateway-ops-section"
    direction: DOWN
    timeout: 30000
- assertVisible:
    id: "gateway-ops-section"

- tapOn:
    id: "tab-hermes"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 45000
- assertVisible:
    id: "HERMES CHAT"
