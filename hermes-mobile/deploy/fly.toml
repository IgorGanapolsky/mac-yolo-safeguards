# Hermes Mobile cloud relay (Fly.io)

Deploy from `services/hermes-relay/` — canonical app name `hermesmobile-cloud`.

```bash
cd services/hermes-relay
fly volumes create hermes_mobile_data --region iad --size 1 -a hermesmobile-cloud
fly deploy -a hermesmobile-cloud
```

Legacy note: `hermes-mobile-cloud.fly.dev` was never provisioned; use `hermesmobile-cloud.fly.dev`.

app = "hermesmobile-cloud"
primary_region = "iad"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  LONG_POLL_MS = "30000"
  HERMES_MOBILE_DB_PATH = "/data/hermes-mobile.db"
  POSTHOG_HOST = "https://us.i.posthog.com"

[mounts]
  source = "hermes_mobile_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
