# Hermes Mobile cloud relay (Fly.io) — same backend as legacy agentleash-cloud.
#
#   fly apps create hermes-mobile-cloud
#   fly volumes create hermes_mobile_data --region iad --size 1 -a hermes-mobile-cloud
#   fly secrets set POSTHOG_API_KEY=phc_... ADMIN_API_KEY=$(openssl rand -hex 32) -a hermes-mobile-cloud
#   fly deploy --config deploy/fly.toml

app = "hermes-mobile-cloud"
primary_region = "iad"

[build]
  dockerfile = "../../../AgentLeash/cloud/Dockerfile"
  build-context = "../../../AgentLeash"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  LONG_POLL_MS = "30000"
  AGENTLEASH_DB_PATH = "/data/hermes-mobile.db"
  POSTHOG_HOST = "https://us.i.posthog.com"

[mounts]
  source = "hermes_mobile_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
