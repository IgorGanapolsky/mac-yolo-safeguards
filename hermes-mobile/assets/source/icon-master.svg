<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Hermes Mobile app icon">
  <!-- Aurora direction (2026-06-26): saturated indigo tile + crisp white H + cyan "core".
       No Gaussian glow (mud at small sizes); high figure/ground contrast so it pops in the
       home grid instead of vanishing on dark wallpapers. Square master; platforms mask corners. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C7DF9"/>
      <stop offset="55%" stop-color="#5B53E6"/>
      <stop offset="100%" stop-color="#3A2FB8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="42%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#sheen)"/>
  <rect x="336" y="300" width="96" height="424" rx="48" fill="#FFFFFF"/>
  <rect x="592" y="300" width="96" height="424" rx="48" fill="#FFFFFF"/>
  <rect x="336" y="466" width="352" height="92" rx="46" fill="url(#cyan)"/>
</svg>
