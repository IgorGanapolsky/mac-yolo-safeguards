<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Hermes Mobile adaptive foreground">
  <!-- Android adaptive foreground: white H + cyan core on transparent. Sits on the Aurora
       background layer. Mark kept inside the 528px (66%) safe zone: x 336-688, y 300-724. -->
  <defs>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <rect x="336" y="300" width="96" height="424" rx="48" fill="#FFFFFF"/>
  <rect x="592" y="300" width="96" height="424" rx="48" fill="#FFFFFF"/>
  <rect x="336" y="466" width="352" height="92" rx="46" fill="url(#cyan)"/>
</svg>
