            - generic [ref=f2e234]:
              - generic [ref=f2e235]: "Control an AI coding agent from your phone on your own Mac, Linux, or Windows computer. Chat with the Hermes gateway, see honest run state, and use Leash Pro to approve or deny risky commands before they execute.Hermes Mobile is an independent mobile control plane for a Hermes gateway you operate. It is built for developers whose workflows also involve Cursor, Claude Code, ChatGPT or OpenAI Codex, Gemini CLI, Replit Agent, GitHub Copilot, Windsurf, OpenClaw, and other coding agents.Hermes Mobile does not sign in to or replace those products. It solves a different job: supervising the Hermes agent and tools running through your own gateway from an Android phone.FREE• Live streaming chat with your Hermes gateway• Current connection and run status instead of a false green state• QR and local network pairing with no Hermes Mobile cloud account• Saved computer profiles for Mac, Linux, and Windows gatewaysLEASH PRO ($19.99/mo)• Review and approve or deny blocked tool calls from your phone• View and edit standing allow or block gate rules synced from your gateway• Manage persistent safety policies across sessions• Capture ThumbGate feedback for assistant output and command decisionsFOR AI CODING AGENT OPERATORS• Cursor and Claude Code users: add a separate phone control surface for your Hermes gateway• ChatGPT and Codex users: supervise a user-operated, multi-provider runtime instead of an OpenAI-only session• Gemini CLI, GitHub Copilot, Windsurf, and OpenClaw users: keep the executing computer and connection route visible• Replit Agent users: operate your own machine and gateway instead of moving the runtime into a cloud IDEBUILT FOR REAL CONNECTIONS• Wi-Fi and LAN for local access• Tailscale or a configured tunnel for remote access• Clear reconnecting, stale, and unavailable states• Your API keys remain on the computer that runs the gatewaySECURITY• Camera access is used only to scan pairing QR codes• Optional product analytics can be disabled in Settings• No ads and no IDFA trackingRequires a computer running a compatible Hermes gateway. Remote access requires your own network, Tailscale, tunnel, or relay setup.Hermes Mobile is independent and is not affiliated with Nous Research, Anthropic, OpenAI, Google, Replit, GitHub, Cursor, Windsurf, or OpenClaw.Source and setup: github.com/IgorGanapolsky/mac-yolo-safeguardsPublisher: Igor GanapolskyHOW THIS DIFFERS FROM OTHER \"HERMES\" APPS• Termux (Android CLI): Runs Hermes on your phone. Hermes Mobile does not — your gateway stays on your computer for better battery, persistence, and full tools.• Hermes Agent (Hen Works): AI on your Android phone. Hermes Mobile is the opposite — remote control for desktop agents on Mac, Linux, or Windows.• Hermes-Relay (cloud relay): Routes through a cloud \"agent in pocket.\" Hermes Mobile pairs directly to your gateway via QR, LAN, or Tailscale — no cloud credits.• Hermex / HermesPilot (native clients): Other Method A apps (WebUI URL + password or Hermes Link relay). Hermes Mobile connects to your gateway API with QR pair, Leash Pro approvals, and honest connection state.FAQ• Do I need Termux? No. Hermes runs on your Mac, Linux, or Windows computer; this app is the remote control.• Is this Hermes Agent (the 1,200★ Play app)? No — that runs AI on Android. We control desktop agents.• Hermex or HermesPilot? Those are other native clients (WebUI server vs Hermes Link relay). We pair directly to your gateway plus ThumbGate Leash.• Do I need a cloud account? No Hermes Mobile account required. Optional Leash Pro subscription for gate rules.• iPhone? Yes — live on the App Store as “Hermes Mobile: AI Agent Leash”. Android is live on Google Play. Both support Leash Pro $19.99/mo."
