app = "hermesmobile-cloud"
primary_region = "iad"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  HERMES_MOBILE_DB_PATH = "/data/hermes-relay.json"

[mounts]
  source = "hermes_mobile_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
